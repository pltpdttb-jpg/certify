<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ttb Audio Interview - Step 3</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6C5CE7',      
                        primaryLight: '#A29BFE', 
                        secondary: '#74B9FF',    
                        accent: '#00CEC9',       
                        surface: '#F8FAFC',      
                        textMain: '#2D3436',
                        textMuted: '#636E72',
                        danger: '#FF7675',
                        success: '#55E6C1',
                        brandNavy: '#0F172A'
                    },
                    fontFamily: { sans: ['Prompt', 'Nunito', 'sans-serif'] },
                    animation: {
                        'slide-up': 'slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'fade-in': 'fadeIn 0.3s ease-out forwards',
                        'pop-in': 'popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
                        'float': 'float 3s ease-in-out infinite',
                        'pulse-fast': 'pulse 0.8s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        slideUp: { '0%': { opacity: 0, transform: 'translateY(40px)' }, '100%': { opacity: 1, transform: 'translateY(0)' } },
                        fadeIn: { '0%': { opacity: 0 }, '100%': { opacity: 1 } },
                        popIn: { '0%': { opacity: 0, transform: 'scale(0.9)' }, '100%': { opacity: 1, transform: 'scale(1)' } },
                        float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-10px)' } }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body { background-color: #E2E8F0; font-family: 'Nunito', 'Prompt', sans-serif; -webkit-tap-highlight-color: transparent; display: flex; justify-content: center; min-height: 100vh; margin: 0; }
        .app-container { width: 100%; max-width: 480px; background-color: #F8FAFC; min-height: 100vh; position: relative; display: flex; flex-direction: column; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15); overflow: hidden; }
        @media (min-width: 640px) { body { padding: 20px 0; } .app-container { min-height: 90vh; max-height: 95vh; border-radius: 40px; } }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); box-shadow: 0 10px 30px rgba(108, 92, 231, 0.05); }
        .shadow-soft-3d { box-shadow: 0 10px 25px -5px rgba(108, 92, 231, 0.25); }
        .btn-modern { transition: all 0.2s ease; } .btn-modern:active:not(:disabled) { transform: scale(0.97); }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root" class="w-full flex justify-center"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SUPABASE_URL = "https://lyfqqrofqbyfezwxwhph.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx5ZnFxcm9mcWJ5ZmV6d3h3aHBoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0ODc3MTAsImV4cCI6MjA4OTA2MzcxMH0.U5rhRSSTplQbcXBL16odRMRL26dy1RCxC_6jkHjhaWA";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 💡 กำหนด URL ของระบบหลัก (Gateway)
        const MASTER_HUB_URL = "https://pltpdttb-jpg.github.io/Audiotest/";

        const Icons = {
            Mic: () => <svg width="28" height="28" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>,
            Stop: () => <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="4" ry="4"></rect></svg>,
            Back: () => <svg width="24" height="24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>,
            Check: () => <svg width="24" height="24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>,
            LogOut: () => <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        };

        // ==========================================
        // MAIN APP ROUTER (Auto Login & Gatekeeper)
        // ==========================================
        function App() {
            const [user, setUser] = useState(null);
            const [sessionState, setSessionState] = useState(null);
            const [rubrics, setRubrics] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [authStatus, setAuthStatus] = useState('กำลังตรวจสอบสิทธิ์เข้าถึง...');
            
            // State สำหรับจัดการ Error แบบ UI (ลดการใช้ alert ที่ทำให้หมุนค้าง)
            const [accessError, setAccessError] = useState(null);

            useEffect(() => {
                const initGatekeeper = async () => {
                    setIsLoading(true);
                    setAccessError(null);
                    
                    try {
                        // 1. ดึงรหัสพนักงานจาก URL
                        const urlParams = new URLSearchParams(window.location.search);
                        const uid = urlParams.get('uid');

                        // 🚨 ดีดกลับถ้ายูสเซอร์เข้า URL มาดื้อๆ
                        if (!uid) {
                            setAccessError("ไม่อนุญาตให้เข้าถึงหน้านี้โดยตรง\nกรุณาเข้าสู่ระบบผ่านหน้าแดชบอร์ดหลัก (Step 1)");
                            setIsLoading(false);
                            return;
                        }

                        setAuthStatus('กำลังค้นหาข้อมูลผู้ใช้งาน...');
                        
                        // 2. ดึงข้อมูล User จาก Supabase
                        const { data: userData, error: userErr } = await supabase.from('users').select('*').eq('employee_id', uid).maybeSingle();
                        if (userErr || !userData || userData.role !== 'Candidate') {
                            setAccessError("ไม่พบข้อมูลผู้เข้าสอบในระบบ หรือคุณไม่มีสิทธิ์เข้าถึง");
                            setIsLoading(false);
                            return;
                        }

                        setAuthStatus('กำลังตรวจสอบผลการสอบทฤษฎี...');
                        
                        // 3. THE GATEKEEPER: ตรวจสอบสถานะการสอบ
                        const { data: sessData, error: sessErr } = await supabase.from('exam_sessions').select('*').eq('user_id', userData.id).maybeSingle();
                        
                        // 🚨 เช็กว่าผ่านด่าน 1 ทฤษฎีหรือยัง
                        if (!sessData || sessData.pk_passed !== true) {
                            setAccessError("การเข้าถึงถูกปฏิเสธ!\nคุณต้องสอบผ่านภาคทฤษฎี 30 ข้อ (ด่านที่ 1) ก่อน\nจึงจะปลดล็อกระบบสัมภาษณ์อัดเสียงได้");
                            setIsLoading(false);
                            return;
                        }

                        setAuthStatus('กำลังเตรียมข้อมูลคำถาม...');
                        
                        // 4. โหลดคำถามทั้งหมด
                        const { data: rubricsData } = await supabase.from('trainer_rubrics').select('*');
                        if (rubricsData) setRubrics(rubricsData);

                        // 5. ผ่านด่านฉลุย
                        setUser(userData);
                        setSessionState(sessData);
                        setIsLoading(false);

                    } catch (err) {
                        console.error(err);
                        setAccessError("เกิดข้อผิดพลาดในการเชื่อมต่อเครือข่าย:\n" + (err.message || "Unknown Error"));
                        setIsLoading(false);
                    }
                };

                initGatekeeper();
            }, []);

            // นำทางกลับไปยังลิงก์ที่ระบุ
            const handleBackToHub = () => {
                window.location.href = MASTER_HUB_URL;
            };

            // หน้าจอแสดงข้อผิดพลาด (Gatekeeper Error UI)
            if (accessError) {
                return (
                    <div className="h-screen w-full flex flex-col items-center justify-center bg-surface p-6 animate-fade-in">
                        <div className="bg-white p-8 rounded-[32px] shadow-xl max-w-sm w-full text-center border-t-4 border-danger animate-pop-in">
                            <div className="w-16 h-16 bg-red-50 text-danger rounded-full flex items-center justify-center text-3xl mx-auto mb-4">🚨</div>
                            <h2 className="text-xl font-extrabold text-brandNavy mb-3">Access Denied</h2>
                            <p className="text-sm font-bold text-slate-500 mb-8 leading-relaxed whitespace-pre-line">{accessError}</p>
                            <button onClick={handleBackToHub} className="w-full bg-brandNavy text-white font-bold py-3.5 rounded-xl shadow-md hover:bg-slate-800 transition-colors btn-modern">
                                กลับสู่หน้าหลัก (Dashboard)
                            </button>
                        </div>
                    </div>
                );
            }

            // หน้าจอโหลดข้อมูล
            if (isLoading) {
                return (
                    <div className="h-screen w-full flex flex-col items-center justify-center bg-surface text-primary font-bold">
                        <div className="w-14 h-14 border-4 border-primary/30 border-t-primary rounded-full animate-spin mb-5 shadow-sm"></div>
                        <p className="animate-pulse">{authStatus}</p>
                    </div>
                );
            }

            return (
                <div className="app-container">
                    <Dashboard user={user} sessionState={sessionState} rubrics={rubrics} onLogout={handleBackToHub} />
                </div>
            );
        }

        // ==========================================
        // DASHBOARD & SMART STATUS LOCK
        // ==========================================
        function Dashboard({ user, sessionState, rubrics, onLogout }) {
            const [view, setView] = useState('home'); 
            const [examQuestions, setExamQuestions] = useState([]);
            const [currentStep, setCurrentStep] = useState(0);
            const [showRules, setShowRules] = useState(false);
            
            useEffect(() => {
                // โชว์กติกาเฉพาะคนที่สถานะพร้อมสอบ (ยังไม่ผ่านการประเมิน, ไม่ถูกล็อกจาก Trainer, ไม่ติดสถานะ Failed)
                if (sessionState?.pk_passed && !sessionState?.trainer_passed && sessionState?.eval_lock_mode === 'AVAILABLE' && sessionState?.overall_status !== 'FAILED') {
                    setShowRules(true);
                }
            }, [sessionState]);

            const isPassed = sessionState?.overall_status === 'CERTIFIED';
            const isFailed = sessionState?.overall_status === 'FAILED';
            const isPending = sessionState?.overall_status === 'IN_PROGRESS';
            const isLockedLive = sessionState?.eval_lock_mode === 'LIVE';

            const startExam = async () => {
                if(rubrics.length === 0) return alert("ไม่พบข้อมูลคำถามในระบบ");
                
                // บล็อก 1: สอบตกแล้ว ต้องรอ Trainer เปิดสิทธิ์ Retake
                if(isFailed) {
                    alert('⚠️ คุณไม่สามารถเริ่มสอบได้\nผลประเมินล่าสุดของคุณคือ "ไม่ผ่าน" กรุณาติดต่อเทรนเนอร์ประจำพื้นที่ เพื่อเปิดสิทธิ์สอบซ่อม (Retake) ครับ');
                    return;
                }

                // บล็อก 2: โดน Trainer ล็อกสิทธิ์ให้ไปสัมภาษณ์สด
                if (isLockedLive) {
                    alert('⚠️ เทรนเนอร์ได้ระบุให้คุณเข้ารับการประเมินแบบ "สัมภาษณ์สด"\nระบบบันทึกเสียงจึงถูกระงับการใช้งานครับ');
                    return;
                }

                try {
                    // ขอสิทธิ์ไมโครโฟน
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    stream.getTracks().forEach(track => track.stop()); 
                    
                    // สุ่มคำถาม
                    const pkQs = rubrics.filter(r => r.category === 'Product Knowledge');
                    const invQs = rubrics.filter(r => r.category === 'Investment Knowledge');
                    const objQs = rubrics.filter(r => r.category === 'Objection Handling');
                    
                    if(pkQs.length === 0 || invQs.length === 0 || objQs.length === 0) {
                        return alert("ระบบมีคำถามไม่ครบ 3 หมวดหมู่ กรุณาติดต่อแอดมิน");
                    }

                    const q1 = pkQs[Math.floor(Math.random() * pkQs.length)];
                    const q2 = invQs[Math.floor(Math.random() * invQs.length)];
                    const q3 = objQs[Math.floor(Math.random() * objQs.length)];

                    // ล็อกฐานข้อมูลเป็น AUDIO ป้องกันการชนกันกับ Trainer
                    await supabase.from('exam_sessions').update({ eval_lock_mode: 'AUDIO' }).eq('user_id', user.id);

                    setExamQuestions([q1, q2, q3]);
                    setCurrentStep(0);
                    setView('exam');
                } catch (err) {
                    alert("กรุณาอนุญาตการใช้งานไมโครโฟนในการตั้งค่าเบราว์เซอร์ของคุณก่อนเริ่มสอบ");
                }
            };
            
            const handleCancel = async () => {
                await supabase.from('exam_sessions').update({ eval_lock_mode: 'AVAILABLE' }).eq('user_id', user.id);
                setView('home');
            };

            const handleNext = async () => {
                if (currentStep < 2) {
                    setCurrentStep(currentStep + 1);
                } else {
                    // คำนวณจำนวนครั้งที่สอบ (Attempt Tracking)
                    const currentAttempts = (sessionState?.trainer_attempts || 0) + 1;
                    
                    // อัปเดตสถานะและจำนวนครั้งทันทีที่ส่งครบ 3 ข้อ
                    await supabase.from('exam_sessions').update({ 
                        eval_lock_mode: 'AVAILABLE', 
                        overall_status: 'IN_PROGRESS',
                        trainer_attempts: currentAttempts
                    }).eq('user_id', user.id);
                    
                    setView('success');
                }
            };

            if (view === 'exam') return <RecordingScreen key={currentStep} user={user} question={examQuestions[currentStep]} step={currentStep} onCancel={handleCancel} onNext={handleNext} />;
            if (view === 'success') return <SuccessScreen onHome={onLogout} />;

            return (
                <div className="flex-1 flex flex-col bg-surface overflow-hidden relative">
                    
                    {/* Modal แสดงกติกาการสอบ */}
                    {showRules && (
                        <div className="absolute inset-0 z-50 flex items-center justify-center p-6 bg-brandNavy/70 backdrop-blur-sm animate-fade-in">
                            <div className="bg-white rounded-[32px] p-6 max-w-sm w-full shadow-2xl animate-pop-in relative overflow-hidden">
                                <div className="absolute top-[-40px] right-[-40px] w-24 h-24 bg-primaryLight rounded-full opacity-20 blur-xl"></div>
                                <div className="w-14 h-14 bg-primaryLight/20 text-primary rounded-2xl flex items-center justify-center text-2xl mb-4 shadow-inner-soft">📋</div>
                                <h2 className="text-xl font-extrabold text-textMain mb-2">กติกาการสอบสัมภาษณ์</h2>
                                <p className="text-xs font-bold text-textMuted mb-5">โปรดอ่านทำความเข้าใจก่อนเริ่มการทดสอบ</p>
                                <div className="space-y-3 mb-6 bg-surface p-4 rounded-2xl border border-gray-100">
                                    <div className="flex items-start"><span className="text-primary font-black mr-2">1.</span><p className="text-xs font-bold text-textMain leading-relaxed">ระบบจะสุ่มคำถามให้คุณทั้งหมด <span className="text-primary font-black">3 ข้อ</span><br/>(Product 1 ข้อ, Investment 1 ข้อ, Objection 1 ข้อ)</p></div>
                                    <div className="flex items-start"><span className="text-danger font-black mr-2">2.</span><p className="text-xs font-bold text-textMain leading-relaxed">เมื่อกดเข้าสู่ข้อสอบ คุณจะมีเวลาเตรียมตัว <span className="text-danger font-black">1 นาที</span> ต่อข้อ</p></div>
                                    <div className="flex items-start"><span className="text-danger font-black mr-2">3.</span><p className="text-xs font-bold text-textMain leading-relaxed">⚠️ <span className="text-danger">คุณต้องกดปุ่ม "ไมโครโฟน" ก่อนหมดเวลา</span> หากปล่อยจนเวลาหมด ระบบจะปรับตกข้อนั้นอัตโนมัติ</p></div>
                                </div>
                                <button onClick={() => setShowRules(false)} className="w-full bg-primary text-white font-bold py-3.5 rounded-xl btn-modern text-sm shadow-[0_8px_20px_rgba(108,92,231,0.25)]">รับทราบกติกา</button>
                            </div>
                        </div>
                    )}

                    <div className="bg-primary text-white pt-12 pb-16 px-6 relative z-0 shrink-0 rounded-b-[40px]">
                        <div className="absolute top-0 right-0 w-64 h-64 bg-white opacity-5 rounded-full -translate-y-1/2 translate-x-1/4"></div>
                        <div className="flex justify-between items-center relative z-10">
                            <div>
                                <h1 className="text-2xl font-extrabold mb-1">Hey {user.first_name_en}!</h1>
                                <p className="text-white/70 text-sm font-medium">Step 3: Audio Assessment</p>
                            </div>
                        </div>
                    </div>

                    <div className="flex-1 bg-white -mt-8 rounded-t-[32px] relative z-10 flex flex-col px-6 pt-8 pb-4 shadow-[0_-10px_40px_rgba(0,0,0,0.05)] animate-slide-up overflow-y-auto">
                        
                        <h3 className="font-extrabold text-textMain text-lg mb-6">Status & Evaluation</h3>
                        
                        {isLockedLive && !isFailed && !isPassed && (
                            <div className="bg-blue-50 border border-blue-200 p-6 rounded-[24px] flex flex-col items-center text-center shadow-sm mb-6">
                                <div className="text-5xl mb-4">👨‍🏫</div>
                                <h4 className="font-extrabold text-blue-800 text-lg">เข้าสู่โหมดสัมภาษณ์สด</h4>
                                <p className="text-xs text-blue-700 font-bold mt-3 leading-relaxed">เทรนเนอร์ประจำพื้นที่ของคุณ ได้เปิดระบบล็อกสิทธิ์เพื่อทำการสัมภาษณ์สดให้คุณแล้ว<br/>ระบบอัดเสียงจึงถูกระงับ กรุณาติดต่อ Trainer เพื่อดำเนินการสอบครับ</p>
                            </div>
                        )}

                        {isFailed && (
                            <div className="bg-red-50 border border-red-200 p-6 rounded-[24px] flex flex-col items-center text-center shadow-sm mb-6">
                                <div className="text-5xl mb-4">🚨</div>
                                <h4 className="font-extrabold text-red-800 text-lg">รอการพิจารณาสอบซ่อม</h4>
                                <p className="text-xs text-red-700 font-bold mt-3 leading-relaxed">ผลการประเมินล่าสุดของคุณ <b>ไม่ผ่านเกณฑ์ (ได้ {sessionState?.trainer_score}%)</b><br/><br/>กรุณาติดต่อ Trainer ของท่านเพื่อรับฟัง Feedback และขออนุมัติสิทธิ์สอบซ่อมครับ</p>
                            </div>
                        )}

                        {isPending && (
                            <div className="bg-orange-50 border border-orange-200 p-6 rounded-[24px] flex flex-col items-center text-center shadow-sm mb-6">
                                <div className="text-5xl mb-4">⏳</div>
                                <h4 className="font-extrabold text-orange-800 text-lg">รอผลการตรวจประเมิน</h4>
                                <p className="text-xs text-orange-700 font-bold mt-3 leading-relaxed">ไฟล์เสียงของคุณกำลังรอคิวให้เทรนเนอร์เข้ามารับฟังและให้คะแนนครับ<br/>สามารถตรวจสอบสถานะได้ที่หน้า Dashboard หลัก</p>
                            </div>
                        )}

                        {isPassed && (
                            <div className="bg-emerald-50 border border-emerald-200 p-6 rounded-[24px] flex flex-col items-center text-center shadow-sm mb-6">
                                <div className="text-5xl mb-4">🏆</div>
                                <h4 className="font-extrabold text-emerald-800 text-lg">ประเมินผ่านเรียบร้อย</h4>
                                <p className="text-xs text-emerald-700 font-bold mt-3 leading-relaxed">ขอแสดงความยินดี! คุณผ่านการประเมิน ttb US Multi-Asset 15/5 ทั้งภาคทฤษฎีและภาคปฏิบัติเรียบร้อยแล้ว</p>
                                <div className="mt-5 inline-block bg-white px-5 py-2 rounded-full border border-emerald-100 text-emerald-600 font-black text-xs uppercase tracking-widest">CERTIFIED</div>
                            </div>
                        )}

                        {!isLockedLive && !isFailed && !isPassed && !isPending && (
                            <div className="bg-secondary/10 border border-secondary/20 p-6 rounded-[24px] flex flex-col items-center justify-center text-center mb-6 relative overflow-hidden group">
                                <div className="w-16 h-16 bg-secondary text-white rounded-2xl flex items-center justify-center text-3xl mb-4 shadow-sm">🎤</div>
                                <h4 className="font-extrabold text-brandNavy text-lg">Audio Assessment</h4>
                                <p className="text-xs text-textMuted font-bold mt-2 px-2 leading-relaxed">ระบบจะสุ่มคำถาม 3 ข้อ ให้คุณอัดเสียงตอบ และส่งให้เทรนเนอร์ประเมินผล</p>
                                {sessionState?.trainer_attempts > 0 && (
                                    <span className="text-danger text-[10px] font-black mt-3 uppercase tracking-widest bg-red-50 px-3 py-1 rounded-full border border-red-100">
                                        การสอบซ่อมรอบที่ {sessionState.trainer_attempts + 1}
                                    </span>
                                )}
                                
                                <button onClick={startExam} className="mt-5 w-full bg-primary text-white font-bold py-3.5 rounded-xl btn-modern text-sm shadow-[0_8px_20px_rgba(108,92,231,0.25)]">เริ่มอัดเสียง (Start)</button>
                            </div>
                        )}
                        
                        <button onClick={onLogout} className="mt-auto pt-4 text-slate-400 hover:text-danger text-xs font-bold flex items-center justify-center transition-colors pb-4">
                            <Icons.Back /> <span className="ml-2 uppercase tracking-widest">กลับสู่หน้าแดชบอร์ดหลัก</span>
                        </button>
                    </div>
                </div>
            );
        }

        // ==========================================
        // RECORDING SCREEN (UI และระบบการบันทึก)
        // ==========================================
        function RecordingScreen({ user, question, step, onCancel, onNext }) {
            const [status, setStatus] = useState('idle'); 
            const [time, setTime] = useState(0);
            const [prepTime, setPrepTime] = useState(60); 
            const [errorMsg, setErrorMsg] = useState('');
            const [audioUrlResult, setAudioUrlResult] = useState(null);
            
            const mediaRecorder = useRef(null);
            const audioChunks = useRef([]);
            const timerRef = useRef(null);
            const recordingTimeRef = useRef(0);
            const mimeType = useRef('');

            const recognitionRef = useRef(null);
            const transcriptRef = useRef(''); 
            const isRecordingRef = useRef(false); 

            useEffect(() => {
                let pTimer;
                if (status === 'idle' && prepTime > 0) {
                    pTimer = setInterval(() => setPrepTime(p => p - 1), 1000);
                } else if (status === 'idle' && prepTime <= 0) {
                    handlePrepTimeout(); 
                }
                return () => clearInterval(pTimer);
            }, [status, prepTime]);

            useEffect(() => {
                return () => { 
                    if(timerRef.current) clearInterval(timerRef.current); 
                    if(recognitionRef.current) recognitionRef.current.stop();
                };
            }, []);

            const formatTime = (secs) => {
                const m = Math.floor(secs / 60).toString().padStart(2, '0');
                const s = (secs % 60).toString().padStart(2, '0');
                return `${m}:${s}`;
            };

            const handlePrepTimeout = async () => {
                setStatus('processing');
                try {
                    const newRecord = { 
                        employee_id: user.employee_id, 
                        first_name_en: user.first_name_en, 
                        question: question.question, 
                        category: question.category, 
                        audio_url: null, 
                        transcript: "[ ไม่มีการตอบคำถาม - หมดเวลาเตรียมตัว 1 นาที ]" 
                    };
                    await supabase.from('audio_submissions').insert([newRecord]);
                    setStatus('done');
                } catch (err) { 
                    setErrorMsg(`❌ ระบบบันทึกข้อมูลล้มเหลว: ${err.message}`); 
                    setStatus('idle'); 
                }
            };

            const setupSpeechRecognition = () => {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) {
                    transcriptRef.current = "[ เบราว์เซอร์ไม่รองรับการถอดความอัตโนมัติ กรุณาฟังจากไฟล์เสียง ]";
                    return null;
                }
                const recognition = new SpeechRecognition();
                recognition.continuous = true; 
                recognition.interimResults = true;
                recognition.lang = 'th-TH'; 
                recognition.onresult = (event) => {
                    let finalTranscript = '';
                    for (let i = event.resultIndex; i < event.results.length; ++i) {
                        if (event.results[i].isFinal) finalTranscript += event.results[i][0].transcript + ' ';
                    }
                    if (finalTranscript) transcriptRef.current += finalTranscript;
                };
                recognition.onend = () => {
                    if (isRecordingRef.current) { try { recognition.start(); } catch(e) {} }
                };
                return recognition;
            };

            const startRecording = async () => {
                setErrorMsg('');
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    const types = ['audio/webm;codecs=opus', 'audio/mp4', 'audio/webm', 'audio/aac'];
                    for (let type of types) { if (MediaRecorder.isTypeSupported(type)) { mimeType.current = type; break; } }
                    if(!mimeType.current) mimeType.current = 'audio/webm'; 

                    mediaRecorder.current = new MediaRecorder(stream, { mimeType: mimeType.current });
                    audioChunks.current = [];
                    
                    transcriptRef.current = '';
                    isRecordingRef.current = true;
                    
                    recognitionRef.current = setupSpeechRecognition();
                    if (recognitionRef.current) { try { recognitionRef.current.start(); } catch(e){} }

                    mediaRecorder.current.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.current.push(e.data); };
                    
                    mediaRecorder.current.onstop = () => {
                        if (recordingTimeRef.current < 2 || audioChunks.current.length === 0) {
                            setErrorMsg("⚠️ เวลาอัดเสียงสั้นเกินไป กรุณาอธิบายรายละเอียดให้ชัดเจนแล้วลองใหม่"); setStatus('idle'); return;
                        }
                        const audioBlob = new Blob(audioChunks.current, { type: mimeType.current });
                        if (audioBlob.size < 1024) { 
                            setErrorMsg("⚠️ ไฟล์เสียงผิดปกติ (ไม่มีเสียงเข้า) กรุณาตรวจสอบไมโครโฟน"); setStatus('idle'); return; 
                        }
                        processAndSubmit(audioBlob); 
                    };

                    mediaRecorder.current.start(200);
                    setStatus('recording'); setTime(0); recordingTimeRef.current = 0;
                    timerRef.current = setInterval(() => { setTime(t => t + 1); recordingTimeRef.current += 1; }, 1000);
                } catch (err) { 
                    setErrorMsg("⚠️ เบราว์เซอร์ของคุณไม่อนุญาตให้ใช้ไมโครโฟน กรุณาตั้งค่าอนุญาต (Allow)"); 
                }
            };

            const stopRecording = () => {
                if (mediaRecorder.current && status === 'recording') {
                    isRecordingRef.current = false; 
                    if (recognitionRef.current) { try { recognitionRef.current.stop(); } catch(e){} }
                    mediaRecorder.current.stop();
                    mediaRecorder.current.stream.getTracks().forEach(track => track.stop()); 
                    clearInterval(timerRef.current);
                    setStatus('processing');
                }
            };

            const processAndSubmit = async (audioBlob) => {
                try {
                    const fileName = `${user.employee_id}_${Date.now()}.${mimeType.current.includes('mp4') ? 'mp4' : 'webm'}`;
                    const { error: uploadErr } = await supabase.storage.from('exam_audios').upload(fileName, audioBlob, { contentType: mimeType.current });
                    if (uploadErr) throw new Error(`อัปโหลดไฟล์เสียงไม่สำเร็จ (${uploadErr.message})`);
                    
                    const publicUrl = supabase.storage.from('exam_audios').getPublicUrl(fileName).data.publicUrl;
                    setAudioUrlResult(publicUrl); 

                    let finalTranscript = transcriptRef.current.trim();
                    if (!finalTranscript) finalTranscript = "[ ระบบไม่สามารถจับข้อความเสียงได้ หรือไม่ได้พูด กรุณาฟังจากไฟล์เสียง ]";

                    const newRecord = { employee_id: user.employee_id, first_name_en: user.first_name_en, question: question.question, category: question.category, audio_url: publicUrl, transcript: finalTranscript, ai_score: null, ai_feedback: null };
                    const { error: dbErr } = await supabase.from('audio_submissions').insert([newRecord]);
                    if (dbErr) throw new Error(`บันทึกข้อมูลลงตารางไม่สำเร็จ (${dbErr.message})`);
                    
                    setStatus('done');
                } catch (err) {
                    console.error("Error Detail:", err); setErrorMsg(`❌ เกิดข้อผิดพลาด: ${err.message}`); setStatus('idle');
                }
            };

            let timerStyles = "text-primary border-blue-50 bg-blue-50/50";
            if (prepTime <= 10) timerStyles = "text-red-500 border-red-700 bg-black animate-pulse-fast";
            else if (prepTime <= 30) timerStyles = "text-danger border-red-100 bg-red-50 animate-pulse";

            if (status === 'done') {
                return <ResultScreen step={step} question={question} audioUrl={audioUrlResult} onNext={onNext} />;
            }

            return (
                <div className="flex-1 flex flex-col bg-secondary/10 relative overflow-hidden animate-slide-up">
                    <div className="pt-10 px-6 pb-20 relative shrink-0 text-center">
                        <button onClick={onCancel} className="absolute top-8 left-6 text-brandNavy p-2 bg-white/50 rounded-full backdrop-blur-sm shadow-sm"><Icons.Back /></button>
                        <div className="w-20 h-20 bg-white rounded-3xl mx-auto flex items-center justify-center text-4xl shadow-sm mb-4 mt-4 animate-float">💬</div>
                        <span className="bg-primary text-white text-[10px] font-extrabold px-3 py-1 rounded-full uppercase tracking-widest">{question.category}</span>
                        <h2 className="text-xs font-bold text-textMuted uppercase tracking-widest mt-3">Question {step + 1} of 3</h2>
                    </div>

                    <div className="flex-1 bg-white -mt-10 rounded-t-[32px] shadow-[0_-10px_40px_rgba(0,0,0,0.05)] relative z-10 flex flex-col p-6">
                        <div className="bg-surface p-5 rounded-[20px] mb-6 border border-gray-100">
                            <p className="font-bold text-brandNavy text-sm leading-relaxed text-center">{question.question}</p>
                        </div>
                        {errorMsg && <div className="bg-red-50 border border-red-200 text-danger p-4 rounded-xl text-xs font-bold w-full text-center mb-4 leading-relaxed">{errorMsg}</div>}

                        <div className="mt-auto mb-6 flex flex-col items-center justify-center w-full">
                            {status === 'idle' && (
                                <div className="text-center w-full animate-fade-in">
                                    <div className={`mb-6 flex flex-col justify-center items-center p-3 rounded-2xl border-2 transition-colors ${timerStyles}`}>
                                        <span className="text-[10px] font-extrabold uppercase tracking-widest mb-1">เวลาเตรียมตัว (ห้ามเกิน 1 นาที)</span>
                                        <span className="text-3xl font-black">{formatTime(prepTime)}</span>
                                    </div>
                                    <button onClick={startRecording} className="w-20 h-20 bg-primary text-white rounded-full flex items-center justify-center shadow-[0_10px_25px_rgba(108,92,231,0.4)] btn-modern mx-auto"><Icons.Mic /></button>
                                    <p className="text-textMuted text-[10px] font-bold mt-4 uppercase tracking-widest">Tap to Record</p>
                                </div>
                            )}

                            {status === 'recording' && (
                                <div className="text-center w-full animate-fade-in">
                                    <div className="mb-6 flex justify-center items-center gap-3 text-danger">
                                        <div className="w-2 h-2 bg-danger rounded-full animate-pulse"></div>
                                        <span className="text-3xl font-black font-mono">{formatTime(time)}</span>
                                    </div>
                                    <div className="relative flex justify-center items-center w-full">
                                        <button onClick={stopRecording} className="w-20 h-20 bg-danger text-white rounded-full flex items-center justify-center relative z-10 shadow-lg btn-modern"><Icons.Stop /></button>
                                    </div>
                                    <p className="text-textMuted text-[10px] font-bold mt-8 uppercase tracking-widest">Tap to Stop & Submit</p>
                                </div>
                            )}

                            {status === 'processing' && (
                                <div className="text-center w-full animate-fade-in">
                                    <div className="w-16 h-16 border-4 border-surface border-t-primary rounded-full animate-spin mx-auto mb-6"></div>
                                    <h3 className="font-extrabold text-brandNavy text-sm mb-1">กำลังบันทึกข้อมูล...</h3>
                                    <p className="text-[10px] font-medium text-textMuted">Uploading audio to secure server.</p>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function ResultScreen({ step, question, audioUrl, onNext }) {
            const isLast = step === 2;
            return (
                <div className="flex-1 flex flex-col h-full bg-surface animate-slide-up relative">
                    <div className="bg-primary text-white pt-10 pb-8 px-6 rounded-b-[32px] shadow-sm relative overflow-hidden shrink-0">
                        <div className="absolute right-[-20px] top-2 w-32 h-32 bg-white opacity-10 rounded-full blur-2xl"></div>
                        <div className="relative z-10 text-center">
                            <div className="w-16 h-16 bg-success/20 text-success rounded-full flex items-center justify-center mx-auto mb-4"><Icons.Check /></div>
                            <h2 className="text-2xl font-black mb-1">Submission Saved!</h2>
                            <p className="text-primaryLight text-[10px] font-bold uppercase tracking-widest">Question {step + 1} / 3 Completed</p>
                        </div>
                    </div>
                    <div className="flex-1 overflow-y-auto p-6 space-y-6 pb-28 flex flex-col justify-start mt-4">
                        <div className="bg-white p-6 rounded-[24px] shadow-soft-3d border border-blue-50 text-center">
                            <p className="text-[10px] font-extrabold text-textMuted uppercase tracking-widest mb-4">You have answered:</p>
                            <p className="font-bold text-brandNavy text-sm leading-relaxed mb-6">{question.question}</p>
                            {audioUrl && (
                                <div className="bg-surface p-4 rounded-2xl border border-gray-100">
                                    <p className="text-[10px] font-extrabold text-primary uppercase tracking-widest mb-2 flex items-center justify-center"><span className="text-base mr-1.5">🎙️</span> Your Audio Recording</p>
                                    <audio controls src={audioUrl} className="w-full outline-none h-10"></audio>
                                </div>
                            )}
                            <p className="text-[10px] text-textMuted font-bold mt-6">⚠️ คำตอบของคุณถูกบันทึกและส่งให้ Trainer เรียบร้อยแล้ว</p>
                        </div>
                    </div>
                    <div className="absolute bottom-0 w-full bg-white/90 backdrop-blur-md px-6 py-5 border-t border-gray-100 z-20">
                        <button onClick={onNext} className={`w-full font-black py-4 rounded-xl btn-modern uppercase tracking-widest text-[13px] shadow-soft-3d ${isLast ? 'bg-success text-white' : 'bg-primary text-white'}`}>
                            {isLast ? 'ส่งข้อสอบทั้งหมด (Finish)' : 'ดำเนินการต่อข้อถัดไป (Next)'}
                        </button>
                    </div>
                </div>
            );
        }

        function SuccessScreen({ onHome }) {
            return (
                <div className="flex-1 flex flex-col items-center justify-center px-6 bg-surface relative overflow-hidden animate-fade-in">
                    <div className="absolute top-1/4 left-1/2 -translate-x-1/2 w-64 h-64 bg-success/20 rounded-full mix-blend-multiply filter blur-3xl"></div>
                    <div className="glass-card p-8 rounded-[32px] text-center relative z-10 w-full shadow-soft-3d">
                        <div className="text-6xl mb-6 animate-bounce">🎉</div>
                        <h2 className="text-xl font-extrabold text-brandNavy mb-3">การประเมินเสร็จสมบูรณ์</h2>
                        <p className="text-xs font-bold text-textMuted mb-8 leading-relaxed">
                            ระบบได้บันทึกข้อมูลการทดสอบของท่านเรียบร้อยแล้ว<br/>โปรดรอรับแจ้งผลจาก Trainer ในลำดับถัดไป
                        </p>
                        <button onClick={onHome} className="w-full bg-primary text-white font-bold py-3.5 rounded-xl btn-modern text-sm mb-3 shadow-[0_8px_20px_rgba(108,92,231,0.25)]">
                            กลับหน้าหลัก (Dashboard)
                        </button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
