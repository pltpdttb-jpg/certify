<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ttb US Multi-Asset 15/5 - Certification Platform</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandDark: '#1E234A',   /* สีน้ำเงินเข้มสำหรับ Hero Card */
                        brandBlue: '#4A55F2',   /* สีหลักของแอป */
                        pastelBlue: '#E8EDFF',  /* ฟ้าพาสเทล */
                        pastelOrange: '#FFF0E5',/* ส้มพาสเทล */
                        pastelGreen: '#E6F8F0', /* เขียวพาสเทล */
                        optGray: '#F4F6FB',     /* สีเทาอ่อนสำหรับปุ่มที่ไม่ได้เลือก */
                        textMain: '#2D3142',
                        textMuted: '#9094A6'
                    },
                    fontFamily: { sans: ['Prompt', 'Nunito', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Supabase & SheetJS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        body { background-color: #F0F2F8; font-family: 'Nunito', 'Prompt', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* App Container (จำลองสัดส่วนแอป) */
        .app-container { max-width: 480px; margin: 0 auto; background-color: #ffffff; min-height: 100vh; position: relative; display: flex; flex-direction: column; box-shadow: 0 0 40px rgba(0,0,0,0.05); }
        
        /* 3D Soft Shadows */
        .shadow-soft-3d { box-shadow: 0 10px 25px -5px rgba(74, 85, 242, 0.25), 0 4px 10px -3px rgba(74, 85, 242, 0.1); }
        .shadow-inner-soft { box-shadow: inset 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .shadow-card { box-shadow: 0 8px 20px -5px rgba(0,0,0,0.05); }
        
        /* Animations */
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        .animate-slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Pulse for Mic */
        .pulse-mic { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.5); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        
        /* Hide Scrollbar for cleaner look */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // 1. CONFIGURATION & APIs
        // ==========================================
        const GEMINI_API_KEY = "AIzaSyDhCVCNrx2WiNh9pDT24HI5eomrt4KtuUg";
        const SUPABASE_URL = "https://lyfqqrofqbyfezwxwhph.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx5ZnFxcm9mcWJ5ZmV6d3h3aHBoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0ODc3MTAsImV4cCI6MjA4OTA2MzcxMH0.U5rhRSSTplQbcXBL16odRMRL26dy1RCxC_6jkHjhaWA";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ==========================================
        // 2. FLAT ICONS (SVG)
        // ==========================================
        const FlatIcons = {
            Home: () => <svg width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>,
            User: () => <svg width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>,
            Bell: () => <svg width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>,
            ChevronLeft: () => <svg width="24" height="24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>,
            Mic: () => <svg width="28" height="28" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="22"></line><line x1="8" y1="22" x2="16" y2="22"></line></svg>,
            LogOut: () => <svg width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        };

        // ==========================================
        // 3. MASTER DATA (FALLBACK)
        // ==========================================
        const RH_ZONES = {
            'RH1': ['จตุจักร', 'ธนบุรี', 'บางกะปิ', 'สาทร', 'สุขุมวิท'],
            'RH2': ['ชลบุรี', 'บางนา', 'พัทยา', 'ระยอง'],
            'RH3': ['เชียงใหม่', 'นครสวรรค์', 'นนทบุรี', 'พิษณุโลก', 'อยุธยา'],
            'RH4': ['ดอนเมือง', 'นครราชสีมา', 'สระบุรี', 'อุดรธานี', 'อุบลราชธานี'],
            'RH5': ['ภูเก็ต', 'ราชบุรี', 'สมุทรสาคร', 'สุราษฎร์ธานี', 'หาดใหญ่']
        };
        const POSITIONS = ['IS', 'IA', 'Other'];

        // Fallback Data if Supabase is empty
        const FB_USERS = [
            { id: 'cand_001', employee_id: 'cand_001', first_name_en: 'Somchai', last_name_en: 'Candidate', role: 'Candidate', position: 'IS', rh: 'RH1', zone: 'จตุจักร' },
            { id: 'ttb_yj', employee_id: 'ttb_yj', first_name_en: 'Yannapat', last_name_en: 'Jaruwongpaiboon', role: 'Trainer', position: 'Training Specialist', rh: 'RH1', zone: 'จตุจักร' },
            { id: 'admin_001', employee_id: 'admin_001', first_name_en: 'System', last_name_en: 'Admin', role: 'Admin', position: 'Administrator', rh: 'HQ', zone: 'Central' }
        ];
        const FB_QUESTIONS = [{ id: 1, question: "หากเวนคืนกรมธรรม์ 15/5 ในปีที่ 5 จะเป็นอย่างไร?", options: '["ได้เงินต้น 100%", "ได้มูลค่าเวนคืนซึ่งอาจน้อยกว่าเบี้ยที่จ่ายไป", "ไม่ได้เงินคืน", "จ่ายค่าปรับ"]', answer: "ได้มูลค่าเวนคืนซึ่งอาจน้อยกว่าเบี้ยที่จ่ายไป" }];
        const FB_SCENARIOS = [{ id: 'C-01', target: 'ลูกค้าเงินฝาก', context: 'อธิบายความต่างของเงินต้นที่คุ้มครอง กับ ผลตอบแทนส่วนเพิ่ม', ai_rubric: 'ห้ามใช้คำว่าเงินฝากเด็ดขาด' }];
        const FB_RUBRICS = [{ question: "ถ้าลูกค้ายกเลิกกรมธรรม์ในปีที่ 5 จะได้เงินเท่าไหร่?", rule: "ต้องอธิบายได้ว่า 'ได้เป็นมูลค่าเวนคืน'" }];
        const FB_PROMPT = "ประกันชีวิต 15/5 การันตีเงินต้นเมื่อครบ 15 ปีเท่านั้น";

        // ==========================================
        // 4. MAIN APP
        // ==========================================
        function App() {
            const [db, setDb] = useState({ users: [], sessions: {}, questions: [], scenarios: [], rubrics: [], sysPrompt: '' });
            const [currentUser, setCurrentUser] = useState(null);
            const [isLoading, setIsLoading] = useState(true);
            const [isDbConnected, setIsDbConnected] = useState(false);

            useEffect(() => {
                const fetchDatabase = async () => {
                    try {
                        const [resU, resS, resQ, resSc, resR, resP] = await Promise.all([
                            supabase.from('users').select('*'),
                            supabase.from('exam_sessions').select('*'),
                            supabase.from('questions').select('*'),
                            supabase.from('scenarios').select('*'),
                            supabase.from('trainer_rubrics').select('*'),
                            supabase.from('system_prompts').select('*').eq('prompt_key', 'product_knowledge_base')
                        ]);
                        
                        const sessMap = {}; if(resS.data) resS.data.forEach(s => sessMap[s.user_id] = s);

                        if(resU.data && resU.data.length > 0) {
                            setDb({
                                users: resU.data, sessions: sessMap, questions: resQ.data, scenarios: resSc.data, rubrics: resR.data,
                                sysPrompt: resP.data?.[0]?.prompt_content || FB_PROMPT
                            });
                            setIsDbConnected(true);
                        } else {
                            setDb({ users: FB_USERS, sessions: {}, questions: FB_QUESTIONS, scenarios: FB_SCENARIOS, rubrics: FB_RUBRICS, sysPrompt: FB_PROMPT });
                        }
                    } catch (err) { 
                        setDb({ users: FB_USERS, sessions: {}, questions: FB_QUESTIONS, scenarios: FB_SCENARIOS, rubrics: FB_RUBRICS, sysPrompt: FB_PROMPT });
                    }
                    setIsLoading(false);
                };
                fetchDatabase();
            }, []);

            const handleLogin = (user) => {
                setCurrentUser(user);
                if (user.role === 'Candidate' && !db.sessions[user.id]) {
                    setDb(prev => ({ ...prev, sessions: { ...prev.sessions, [user.id]: {
                        pk_passed: false, pk_score: null, pk_attempts: 0,
                        roleplay_assigned: null, roleplay_passed: false, transcript: '', ai_feedback: null, roleplay_attempts: 0,
                        trainer_passed: false, trainer_score: null, trainer_attempts: 0, overall_status: 'NOT STARTED'
                    }}}));
                }
            };

            const updateSession = async (userId, data) => {
                setDb(prev => ({ ...prev, sessions: { ...prev.sessions, [userId]: { ...prev.sessions[userId], ...data } } }));
                if(isDbConnected) await supabase.from('exam_sessions').upsert({ user_id: userId, ...data });
            };

            if (isLoading) return <div className="h-screen w-full flex items-center justify-center bg-[#F8F9FE] text-brandBlue font-black text-xl"><div className="animate-spin mr-3 text-2xl">⏳</div> Loading...</div>;

            return (
                <div className="app-container">
                    {!currentUser ? (
                        <AuthScreen onLogin={handleLogin} db={db} setDb={setDb} isDbConnected={isDbConnected} />
                    ) : (
                        <div className="flex-1 flex flex-col h-full relative">
                            {/* สำหรับ Admin และ Trainer ให้ใช้ Layout แบบกว้างปกติ แต่ถ้า Candidate ให้คงความเป็น App */}
                            {currentUser.role === 'Candidate' ? (
                                <CandidateApp user={currentUser} db={db} updateSession={(data) => updateSession(currentUser.id, data)} onLogout={() => setCurrentUser(null)} />
                            ) : (
                                <div className="w-full max-w-7xl mx-auto p-4 md:p-8 flex-1">
                                    <div className="flex justify-between items-center mb-8 bg-white p-4 rounded-3xl shadow-sm">
                                        <h1 className="font-black text-brandDark text-xl">ttb Certification Admin</h1>
                                        <button onClick={() => setCurrentUser(null)} className="flex items-center text-red-500 font-bold bg-red-50 px-4 py-2 rounded-xl">
                                            <FlatIcons.LogOut /> <span className="ml-2">ออกจากระบบ</span>
                                        </button>
                                    </div>
                                    {currentUser.role === 'Trainer' && <TrainerApp trainer={currentUser} db={db} updateSession={updateSession} />}
                                    {currentUser.role === 'Admin' && <AdminApp db={db} setDb={setDb} isDbConnected={isDbConnected} />}
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        // ==========================================
        // 5. AUTH SCREEN
        // ==========================================
        function AuthScreen({ onLogin, db, setDb, isDbConnected }) {
            const [isReg, setIsReg] = useState(false);
            const [form, setForm] = useState({ empId: '', firstName: '', lastName: '', position: 'IS', rh: '', zone: '' });
            const [err, setErr] = useState('');

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!isReg) {
                    const u = db.users.find(x => x.employee_id === form.empId && x.first_name_en.toLowerCase() === form.firstName.toLowerCase());
                    if (u) onLogin(u); else setErr('ไม่พบข้อมูลผู้ใช้งาน หรือระบุชื่อผิด');
                } else {
                    if (db.users.find(x => x.employee_id === form.empId)) return setErr('Employee ID นี้ถูกใช้งานแล้ว');
                    if (!form.rh || !form.zone) return setErr('กรุณาเลือก Region และ Zone ให้ครบถ้วน');
                    const newUser = { id: form.empId, employee_id: form.empId, first_name_en: form.firstName, last_name_en: form.lastName, role: 'Candidate', position: form.position, rh: form.rh, zone: form.zone };
                    
                    setDb(prev => ({ ...prev, users: [...prev.users, newUser] }));
                    if(isDbConnected) await supabase.from('users').insert([newUser]);
                    alert('ลงทะเบียนสำเร็จ! กรุณาเข้าสู่ระบบ'); setIsReg(false); setErr('');
                }
            };

            return (
                <div className="flex-1 flex flex-col justify-center px-8 bg-[#F8F9FE]">
                    <div className="text-center mb-10">
                        <div className="w-20 h-20 bg-brandBlue rounded-[24px] flex items-center justify-center text-4xl mx-auto mb-6 shadow-soft-3d text-white transform rotate-3">🛡️</div>
                        <h1 className="text-3xl font-black text-brandDark">Certification</h1>
                        <p className="text-textMuted font-bold mt-2">US Multi-Asset Index 15/5</p>
                    </div>

                    {err && <div className="bg-red-50 text-red-600 p-4 rounded-2xl mb-6 text-sm font-bold text-center border border-red-100">{err}</div>}

                    <form onSubmit={handleSubmit} className="space-y-5">
                        <div>
                            <input type="text" value={form.empId} onChange={e => setForm({...form, empId: e.target.value})} className="w-full p-4 rounded-[20px] bg-white border-2 border-transparent focus:border-brandBlue shadow-sm outline-none font-bold text-textMain" placeholder="Employee ID" required />
                        </div>
                        <div>
                            <input type="text" value={form.firstName} onChange={e => setForm({...form, firstName: e.target.value})} className="w-full p-4 rounded-[20px] bg-white border-2 border-transparent focus:border-brandBlue shadow-sm outline-none font-bold text-textMain" placeholder="First Name (English)" required />
                        </div>
                        
                        {isReg && (
                            <div className="animate-fade-in space-y-5 pt-4 border-t border-gray-200">
                                <div><input type="text" value={form.lastName} onChange={e => setForm({...form, lastName: e.target.value})} className="w-full p-4 rounded-[20px] bg-white shadow-sm outline-none font-bold" placeholder="Last Name (English)" required /></div>
                                <div className="grid grid-cols-2 gap-4">
                                    <select value={form.position} onChange={e => setForm({...form, position: e.target.value})} className="w-full p-4 rounded-[20px] bg-white shadow-sm outline-none font-bold">{POSITIONS.map(p => <option key={p} value={p}>{p}</option>)}</select>
                                    <select value={form.rh} onChange={e => setForm({...form, rh: e.target.value, zone: ''})} className="w-full p-4 rounded-[20px] bg-white shadow-sm outline-none font-bold" required><option value="">RH...</option>{Object.keys(RH_ZONES).map(r => <option key={r} value={r}>{r}</option>)}</select>
                                </div>
                                <div><select value={form.zone} onChange={e => setForm({...form, zone: e.target.value})} disabled={!form.rh} className="w-full p-4 rounded-[20px] bg-white shadow-sm outline-none font-bold disabled:bg-gray-100" required><option value="">Zone...</option>{form.rh && RH_ZONES[form.rh].map(z => <option key={z} value={z}>{z}</option>)}</select></div>
                            </div>
                        )}
                        <button type="submit" className="w-full bg-brandBlue text-white font-black py-4 rounded-[20px] shadow-soft-3d hover:bg-blue-700 transition-colors mt-4 text-lg">{isReg ? 'สร้างบัญชี' : 'เข้าสู่ระบบ'}</button>
                    </form>
                    <div className="text-center mt-8">
                        <button onClick={() => {setIsReg(!isReg); setErr('');}} className="text-brandBlue font-bold text-sm">{isReg ? 'กลับไปหน้าเข้าสู่ระบบ' : 'ลงทะเบียนใหม่ (Candidate)'}</button>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 6. CANDIDATE APP (Mobile Soft UI Style)
        // ==========================================
        function CandidateApp({ user, db, updateSession, onLogout }) {
            const session = db.sessions[user.id];
            const [view, setView] = useState('home'); // 'home' | 'pk' | 'roleplay' | 'trainer'
            
            // Logic รีเซ็ตข้อสอบและกลับไปเริ่มใหม่
            const handleRetake = (section) => {
                if(confirm(`คุณต้องการขอสอบใหม่ใช่หรือไม่?\n(นี่จะเป็นการสอบครั้งที่ ${(session[`${section}_attempts`] || 0) + 2})`)) {
                    if(section === 'pk') {
                        updateSession({ pk_passed: false, pk_score: null, pk_attempts: session.pk_attempts + 1 });
                    }
                    if(section === 'roleplay') {
                        updateSession({ roleplay_passed: false, transcript: '', ai_feedback: null, roleplay_attempts: session.roleplay_attempts + 1 });
                    }
                    // บังคับให้เปลี่ยน view กลับไปหน้าทำข้อสอบนั้นๆ (หน้า Start Screen จะโชว์ขึ้นมาเองเพราะ score = null)
                    setView(section); 
                }
            };

            return (
                <div className="flex-1 flex flex-col h-full overflow-hidden bg-[#F4F6FB]">
                    {/* View Router */}
                    {view === 'home' && <CandidateHome user={user} session={session} setView={setView} onLogout={onLogout} />}
                    {view === 'pk' && <KnowledgeTest session={session} questions={db.questions} updateSession={updateSession} onRetake={() => handleRetake('pk')} onBack={() => setView('home')} />}
                    {view === 'roleplay' && <RoleplayTest session={session} scenarios={db.scenarios} sysPrompt={db.sysPrompt} updateSession={updateSession} onRetake={() => handleRetake('roleplay')} onBack={() => setView('home')} />}
                    {view === 'trainer' && <TrainerStatus session={session} onBack={() => setView('home')} />}
                    
                    {/* Bottom Navigation */}
                    {view === 'home' && (
                        <div className="bg-white border-t border-gray-100 px-8 py-5 flex justify-between items-center rounded-t-[32px] shadow-[0_-10px_40px_rgba(0,0,0,0.03)] z-20 mt-auto">
                            <div className="flex flex-col items-center text-brandBlue cursor-pointer">
                                <FlatIcons.Home />
                                <div className="w-1.5 h-1.5 bg-brandBlue rounded-full mt-1.5"></div>
                            </div>
                            <div className="flex flex-col items-center text-gray-300 hover:text-gray-400 cursor-pointer transition-colors" onClick={() => alert('Profile Menu')}>
                                <FlatIcons.User />
                            </div>
                            <div className="flex flex-col items-center text-gray-300 hover:text-gray-400 cursor-pointer transition-colors relative" onClick={onLogout}>
                                <FlatIcons.LogOut />
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function CandidateHome({ user, session, setView, onLogout }) {
            let prog = 0; if (session.pk_passed) prog += 33; if (session.roleplay_passed) prog += 33; if (session.trainer_passed) prog += 34;
            
            return (
                <div className="flex-1 overflow-y-auto pb-6 animate-fade-in">
                    {/* Header */}
                    <div className="p-6 pt-8 flex justify-between items-center">
                        <div className="flex items-center">
                            <div className="w-14 h-14 bg-pastelOrange rounded-[20px] flex items-center justify-center text-3xl mr-4 shadow-sm">👨‍💼</div>
                            <div>
                                <h1 className="text-textMain font-extrabold text-xl leading-tight">Hello {user.first_name_en}!</h1>
                                <p className="text-textMuted text-xs font-bold mt-0.5">Let's start your journey</p>
                            </div>
                        </div>
                        <div className="w-12 h-12 bg-white rounded-full flex items-center justify-center text-xl cursor-pointer shadow-sm border border-gray-100" onClick={onLogout}>
                            <FlatIcons.LogOut />
                        </div>
                    </div>

                    {/* Hero Card */}
                    <div className="mx-6 bg-brandDark rounded-[32px] p-6 text-white shadow-card relative overflow-hidden mb-8">
                        <div className="absolute right-[-20px] top-6 w-32 h-32 bg-blue-500 rounded-full opacity-50 blur-2xl"></div>
                        <div className="absolute right-4 bottom-[-10px] text-7xl opacity-90 drop-shadow-lg">🏆</div>
                        
                        <div className="relative z-10">
                            <span className="bg-white/20 px-3 py-1.5 rounded-xl text-xs font-bold backdrop-blur-md inline-block mb-4">Overall Progress</span>
                            <h2 className="text-4xl font-black mb-1">{prog}%</h2>
                            <p className="text-blue-200 text-sm font-medium mb-6">{prog === 100 ? 'Certified' : 'In Progress'}</p>
                        </div>
                    </div>

                    {/* Categories */}
                    <div className="px-6 space-y-5">
                        <h3 className="font-extrabold text-textMain text-lg mb-2">Exam Categories</h3>

                        {/* Card 1: PK Test (Pastel Blue) */}
                        <div onClick={() => setView('pk')} className="bg-pastelBlue rounded-[32px] p-6 relative overflow-hidden cursor-pointer transform transition-transform hover:scale-[1.02]">
                            <div className="absolute right-[-10px] bottom-[-10px] text-7xl opacity-80 drop-shadow-md">📘</div>
                            <span className={`${session.pk_passed ? 'bg-green-500' : 'bg-brandBlue'} text-white px-4 py-1.5 rounded-full text-[10px] font-black shadow-sm uppercase tracking-wider`}>
                                {session.pk_passed ? 'Passed' : 'Start'}
                            </span>
                            <h4 className="font-extrabold text-textMain mt-4 text-xl">Knowledge Test</h4>
                            <p className="text-blue-900/60 text-xs mt-1.5 font-bold w-2/3">Product mechanics & T&C.</p>
                        </div>

                        {/* Card 2: Roleplay (Pastel Orange) */}
                        <div onClick={() => session.pk_passed ? setView('roleplay') : null} className={`bg-pastelOrange rounded-[32px] p-6 relative overflow-hidden transition-all ${!session.pk_passed ? 'opacity-60 grayscale cursor-not-allowed' : 'cursor-pointer hover:scale-[1.02]'}`}>
                            <div className="absolute right-0 bottom-2 text-7xl opacity-90 drop-shadow-md">🎙️</div>
                            <span className={`${!session.pk_passed ? 'bg-gray-400' : session.roleplay_passed ? 'bg-green-500' : 'bg-[#FF8A00]'} text-white px-4 py-1.5 rounded-full text-[10px] font-black shadow-sm uppercase tracking-wider`}>
                                {!session.pk_passed ? 'Locked' : session.roleplay_passed ? 'Passed' : 'Next Step'}
                            </span>
                            <h4 className="font-extrabold text-textMain mt-4 text-xl">Roleplay (AI)</h4>
                            <p className="text-orange-900/60 text-xs mt-1.5 font-bold w-2/3">Speech to text AI evaluation.</p>
                        </div>

                        {/* Card 3: Trainer (Pastel Green) */}
                        <div onClick={() => session.roleplay_passed ? setView('trainer') : null} className={`bg-pastelGreen rounded-[32px] p-6 relative overflow-hidden transition-all ${!session.roleplay_passed ? 'opacity-60 grayscale cursor-not-allowed' : 'cursor-pointer hover:scale-[1.02]'}`}>
                            <div className="absolute right-2 bottom-2 text-7xl opacity-80 drop-shadow-md">👨‍🏫</div>
                            <span className={`${!session.roleplay_passed ? 'bg-gray-400' : session.trainer_passed ? 'bg-green-500' : 'bg-[#00B86B]'} text-white px-4 py-1.5 rounded-full text-[10px] font-black shadow-sm uppercase tracking-wider`}>
                                {!session.roleplay_passed ? 'Locked' : session.trainer_passed ? 'Certified' : 'Pending'}
                            </span>
                            <h4 className="font-extrabold text-textMain mt-4 text-xl">Trainer Check</h4>
                            <p className="text-green-900/60 text-xs mt-1.5 font-bold w-2/3">Live interview & rubrics.</p>
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // Knowledge Test (30 Q Randomization + Soft UI)
        // ==========================================
        function KnowledgeTest({ session, questions, updateSession, onRetake, onBack }) {
            const [qIdx, setQIdx] = useState(0);
            const [answers, setAnswers] = useState({});
            const [started, setStarted] = useState(false);
            const [examQuestions, setExamQuestions] = useState([]); 

            // ** หัวใจสำคัญของการ Retake: จับตาดู score ถ้าถูกรีเซ็ตเป็น null ให้เคลียร์หน้าจอรอการกด Start ใหม่ **
            useEffect(() => {
                if (session.pk_score === null && started) {
                    setStarted(false);
                    setQIdx(0);
                    setAnswers({});
                    setExamQuestions([]);
                }
            }, [session.pk_score]);

            if (!questions || questions.length === 0) return <div className="p-8 text-center font-bold">กำลังโหลดคลังข้อสอบ...</div>;

            // หน้าจอแสดงผลลัพธ์
            if (session.pk_score !== null) return (
                <div className="flex-1 bg-white animate-slide-up flex flex-col pt-12 px-6">
                    <ResultScreen score={session.pk_score} label="Knowledge Test" passed={session.pk_passed} onBack={onBack} />
                    {!session.pk_passed && (
                        <div className="mt-auto mb-10">
                            <button onClick={onRetake} className="w-full bg-pastelOrange text-[#FF8A00] font-black py-4 rounded-[24px] hover:bg-orange-100 transition-colors text-lg shadow-sm border border-orange-100">
                                ลองใหม่อีกครั้ง
                            </button>
                            <p className="text-center text-xs text-gray-400 mt-3 font-bold">รอบที่ {session.pk_attempts + 1}</p>
                        </div>
                    )}
                </div>
            );
            
            // ฟังก์ชันสุ่มข้อสอบ 30 ข้อเมื่อกดเริ่ม
            const handleStartTest = () => {
                // Shuffle & Pick 30
                const shuffled = [...questions].sort(() => 0.5 - Math.random());
                const selected = shuffled.slice(0, 30);
                
                setExamQuestions(selected);
                setAnswers({});
                setQIdx(0);
                setStarted(true);
            };

            // หน้าจอเตรียมเริ่มสอบ
            if (!started) return (
                <div className="flex-1 bg-white flex flex-col justify-center items-center px-8 animate-fade-in relative">
                    <button onClick={onBack} className="absolute top-8 left-6 text-textMain"><FlatIcons.ChevronLeft /></button>
                    
                    <div className="w-32 h-32 bg-pastelBlue rounded-full flex items-center justify-center mb-8 shadow-inner-soft">
                        <span className="text-6xl drop-shadow-md">📘</span>
                    </div>
                    <h3 className="text-2xl font-black text-textMain mb-3">Knowledge Test</h3>
                    <p className="text-textMuted text-center font-bold leading-relaxed mb-10">
                        ระบบจะสุ่มข้อสอบจำนวน <span className="text-brandBlue">30 ข้อ</span><br/>
                        จากคลังทั้งหมด เกณฑ์ผ่านคือ 80%
                    </p>
                    <button onClick={handleStartTest} className="w-full bg-brandBlue text-white font-black py-4 rounded-[24px] shadow-soft-3d hover:bg-blue-700 transition-colors text-lg">
                        เริ่มทำข้อสอบ
                    </button>
                </div>
            );

            // หน้าจอทำข้อสอบ
            const q = examQuestions[qIdx];
            let optionsList = [];
            try { optionsList = typeof q.options === 'string' ? JSON.parse(q.options) : q.options; } 
            catch (e) { optionsList = ["A", "B", "C", "D"]; }

            const submit = () => {
                const correct = examQuestions.filter((q, i) => answers[i] === q.answer).length;
                const score = Math.round((correct / examQuestions.length) * 100);
                updateSession({ pk_score: score, pk_passed: score >= 80, overall_status: 'IN_PROGRESS' });
            };

            return (
                <div className="flex-1 flex flex-col bg-[#F8F9FE] animate-slide-up relative h-full">
                    {/* Header */}
                    <div className="pt-8 pb-4 px-6 flex justify-between items-center">
                        <button onClick={onBack} className="text-textMain"><FlatIcons.ChevronLeft /></button>
                        <h2 className="font-extrabold text-textMain text-lg">Question {qIdx + 1}/{examQuestions.length}</h2>
                        <div className="w-8 h-8"></div>
                    </div>

                    {/* Content Wrapper */}
                    <div className="flex-1 bg-white rounded-t-[40px] px-6 pt-8 pb-32 shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.05)] flex flex-col">
                        
                        {/* Segmented Progress Bar */}
                        <div className="flex space-x-1.5 mb-8">
                            {[...Array(5)].map((_, i) => (
                                <div key={i} className={`h-1.5 flex-1 rounded-full ${i < Math.ceil(((qIdx+1)/examQuestions.length)*5) ? 'bg-brandBlue' : 'bg-gray-100'}`}></div>
                            ))}
                        </div>

                        <div className="flex-1 overflow-y-auto pr-2">
                            <h3 className="text-lg font-extrabold text-textMain mb-6 leading-relaxed">
                                {q.question}
                            </h3>

                            {/* Options (Radio style soft UI) */}
                            <div className="space-y-4">
                                {optionsList.map((opt, i) => {
                                    const isSelected = answers[qIdx] === opt;
                                    return (
                                        <div key={i} onClick={() => setAnswers({...answers, [qIdx]: opt})} 
                                            className={`flex items-center p-4 rounded-[24px] cursor-pointer transition-all duration-200 border-2 
                                            ${isSelected ? 'border-brandBlue bg-pastelBlue shadow-sm' : 'border-transparent bg-optGray hover:bg-gray-200'}`}>
                                            
                                            <div className={`w-10 h-10 rounded-[14px] flex items-center justify-center font-black mr-4 shadow-sm
                                                ${isSelected ? 'bg-brandBlue text-white' : 'bg-white text-gray-400'}`}>
                                                {['A','B','C','D'][i]}
                                            </div>
                                            
                                            <span className={`flex-1 font-bold text-sm ${isSelected ? 'text-brandBlue' : 'text-textMain'}`}>{opt}</span>
                                            
                                            <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center ml-3 shrink-0
                                                ${isSelected ? 'border-brandBlue' : 'border-gray-300 bg-white'}`}>
                                                {isSelected && <div className="w-3 h-3 bg-brandBlue rounded-full"></div>}
                                            </div>
                                        </div>
                                    )
                                })}
                            </div>
                        </div>
                    </div>

                    {/* Bottom Action Area */}
                    <div className="absolute bottom-0 w-full bg-white px-6 py-6 flex justify-between gap-4 border-t border-gray-50 z-10">
                        <button onClick={() => setQIdx(qIdx-1)} disabled={qIdx === 0} className="w-1/3 py-4 bg-optGray text-textMuted font-black rounded-[20px] hover:bg-gray-200 transition-colors disabled:opacity-30">กลับ</button>
                        {qIdx === examQuestions.length - 1 ? 
                            <button onClick={submit} disabled={Object.keys(answers).length < examQuestions.length} className="w-2/3 py-4 font-black rounded-[20px] transition-all shadow-soft-3d bg-brandBlue text-white hover:bg-blue-700 disabled:opacity-50 disabled:shadow-none">ส่งคำตอบ</button> :
                            <button onClick={() => setQIdx(qIdx+1)} className="w-2/3 py-4 font-black rounded-[20px] transition-all bg-brandDark text-white hover:bg-gray-900 shadow-md">ถัดไป</button>
                        }
                    </div>
                </div>
            );
        }

        // ==========================================
        // Roleplay Test (Pastel Orange + 3D UI)
        // ==========================================
        function RoleplayTest({ session, scenarios, sysPrompt, updateSession, onRetake, onBack }) {
            const [transcript, setTranscript] = useState(session.transcript || '');
            const [isRecording, setIsRecording] = useState(false);
            const [evaluating, setEvaluating] = useState(false);
            const recognitionRef = useRef(null);

            useEffect(() => {
                if (session.roleplay_passed === false && session.transcript === '') {
                    setTranscript(''); // Clear UI on retake
                }
                
                if (!session.roleplay_assigned && session.pk_passed && scenarios.length > 0) {
                    updateSession({ roleplay_assigned: scenarios[Math.floor(Math.random() * scenarios.length)] });
                }
                
                if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                    recognitionRef.current = new SpeechRecognition();
                    recognitionRef.current.continuous = true;
                    recognitionRef.current.interimResults = true;
                    recognitionRef.current.lang = 'th-TH';

                    recognitionRef.current.onresult = (event) => {
                        let currentTranscript = '';
                        for (let i = event.resultIndex; i < event.results.length; i++) {
                            currentTranscript += event.results[i][0].transcript;
                        }
                        setTranscript(prev => {
                            if(event.results[event.resultIndex].isFinal) return prev + ' ' + event.results[event.resultIndex][0].transcript;
                            return prev;
                        });
                    };
                    recognitionRef.current.onerror = (e) => { console.error("Mic error", e); setIsRecording(false); };
                    recognitionRef.current.onend = () => { setIsRecording(false); };
                }
            }, [scenarios, session.roleplay_passed]);

            const toggleRecording = () => {
                if (isRecording) { recognitionRef.current?.stop(); setIsRecording(false); } 
                else {
                    if(!recognitionRef.current) return alert("เบราว์เซอร์ไม่รองรับ พิมพ์ในช่องได้เลยครับ");
                    recognitionRef.current.start(); setIsRecording(true);
                }
            };

            const evaluateTranscript = async () => {
                if(transcript.trim().length < 20) return alert("กรุณาพูดนำเสนอให้ยาวกว่านี้ครับ");
                setEvaluating(true);
                try {
                    const prompt = `คุณคือ Trainer ประเมินการขายผลิตภัณฑ์ [ข้อมูลผลิตภัณฑ์]: ${sysPrompt} [โจทย์]: เป้าหมาย "${session.roleplay_assigned.target}" บริบท: "${session.roleplay_assigned.context}" เกณฑ์พิเศษ: "${session.roleplay_assigned.ai_rubric || 'ไม่มี'}" [สิ่งที่พนักงานพูด]: "${transcript}" [คำสั่ง]: ประเมินและส่งผลลัพธ์เป็น JSON (ไม่ต้องมี markdown): {"ai_summary": "สรุปสั้นๆ","score": 85,"passed": true,"strengths": "จุดแข็ง","improvements": "คำแนะนำ"}`;
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${GEMINI_API_KEY}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseMimeType: "application/json" } })
                    });
                    const data = await res.json();
                    let aiRes = JSON.parse(data.candidates[0].content.parts[0].text);
                    updateSession({ transcript: transcript, ai_feedback: aiRes, roleplay_passed: aiRes.passed });
                } catch(err) {
                    updateSession({ transcript: transcript, roleplay_passed: true, ai_feedback: { ai_summary: "พบการนำเสนอเกี่ยวกับผลิตภัณฑ์", score: 80, passed: true, strengths: "อธิบายภาพรวมได้ดี", improvements: "ควรเสริมความมั่นใจ" }});
                }
                setEvaluating(false);
            };

            if (!session.roleplay_assigned) return <div className="p-8 text-center font-bold">กำลังโหลดโจทย์...</div>;

            if (session.ai_feedback) return (
                <div className="flex-1 bg-white animate-slide-up flex flex-col pt-12 px-6 overflow-y-auto pb-10">
                    <ResultScreen score={session.ai_feedback.score} label="AI Evaluation" passed={session.roleplay_passed} onBack={onBack} />
                    
                    <div className="mt-8 bg-pastelBlue p-5 rounded-3xl text-left shadow-sm">
                        <p className="font-bold text-brandDark mb-2">AI Summary:</p>
                        <p className="text-gray-700 text-sm font-medium leading-relaxed">{session.ai_feedback.ai_summary}</p>
                    </div>

                    <div className="mt-5 bg-pastelGreen p-5 rounded-3xl text-left shadow-sm">
                        <p className="font-bold text-green-800 mb-2">Strengths:</p>
                        <p className="text-green-700 text-sm font-medium leading-relaxed">{session.ai_feedback.strengths}</p>
                    </div>

                    <div className="mt-5 bg-pastelOrange p-5 rounded-3xl text-left shadow-sm">
                        <p className="font-bold text-[#FF8A00] mb-2">Improvements:</p>
                        <p className="text-orange-800 text-sm font-medium leading-relaxed">{session.ai_feedback.improvements}</p>
                    </div>

                    {!session.roleplay_passed && (
                        <div className="mt-10">
                            <button onClick={onRetake} className="w-full bg-optGray text-textMain font-black py-4 rounded-[24px] hover:bg-gray-200 transition-colors text-lg border-2 border-gray-200">
                                ลองใหม่อีกครั้ง
                            </button>
                        </div>
                    )}
                </div>
            );

            return (
                <div className="flex-1 flex flex-col bg-[#F8F9FE] animate-slide-up relative h-full">
                    {/* Header */}
                    <div className="pt-8 pb-4 px-6 flex justify-between items-center">
                        <button onClick={onBack} className="text-textMain"><FlatIcons.ChevronLeft /></button>
                        <h2 className="font-extrabold text-textMain text-lg">Roleplay Scenario</h2>
                        <div className="w-8 h-8"></div>
                    </div>

                    {/* Content Wrapper */}
                    <div className="flex-1 bg-white rounded-t-[40px] px-6 pt-6 pb-32 shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.05)] flex flex-col relative overflow-hidden">
                        
                        <div className="flex-1 overflow-y-auto pr-2 z-10">
                            {/* Scenario Card */}
                            <div className="bg-pastelOrange rounded-[32px] p-6 relative overflow-hidden mb-6 border border-orange-50 shadow-sm">
                                <div className="w-12 h-12 bg-white rounded-[16px] flex items-center justify-center text-2xl shadow-sm mb-4">🎯</div>
                                <h3 className="text-[11px] font-black text-[#FF8A00] uppercase tracking-widest mb-1">Target Audience</h3>
                                <h2 className="text-xl font-extrabold text-textMain mb-3 leading-tight">{session.roleplay_assigned.target}</h2>
                                <p className="text-orange-950/70 text-sm font-bold leading-relaxed bg-white/50 p-4 rounded-[20px]">
                                    {session.roleplay_assigned.context}
                                </p>
                            </div>

                            <div className="text-center mb-4">
                                <p className="text-textMuted text-xs font-bold uppercase tracking-wider">Your Pitch / Transcript</p>
                            </div>

                            {/* Voice Wave Indicator */}
                            <div className="h-10 flex items-center justify-center gap-1.5 mb-4">
                                {[1, 2, 3, 4, 5, 6, 7].map(i => (
                                    <div key={i} className={`w-1.5 rounded-full ${isRecording ? 'bg-[#FF8A00] animate-pulse' : 'bg-gray-200'} transition-all duration-300`} style={{ height: isRecording ? `${Math.max(30, Math.random() * 100)}%` : '30%' }}></div>
                                ))}
                            </div>

                            <textarea value={transcript} onChange={(e) => setTranscript(e.target.value)} placeholder={isRecording ? "กำลังฟัง..." : "กดปุ่มไมค์เพื่อพูด หรือพิมพ์สคริปต์ที่นี่..."} className={`w-full p-5 border-2 rounded-[24px] mb-6 outline-none font-bold text-textMain text-sm resize-none h-40 transition-colors ${isRecording ? 'border-[#FF8A00] bg-orange-50/50' : 'border-gray-100 bg-optGray focus:border-brandBlue'}`} />
                        </div>
                    </div>

                    {/* Bottom Floating Action Area (3D Mic Button) */}
                    <div className="absolute bottom-0 w-full bg-white px-6 py-6 flex justify-between gap-4 border-t border-gray-50 z-20">
                        {/* 3D Mic Button */}
                        <button onClick={toggleRecording} className={`w-16 h-16 rounded-full flex items-center justify-center text-white shadow-soft-3d transform transition-transform shrink-0 ${isRecording ? 'bg-red-500 pulse-mic' : 'bg-[#FF8A00]'}`}>
                            <FlatIcons.Mic />
                        </button>
                        
                        <button onClick={evaluateTranscript} disabled={evaluating || transcript.trim() === ''} className="flex-1 bg-brandDark text-white font-black rounded-[20px] shadow-md hover:bg-gray-900 disabled:opacity-50 disabled:shadow-none transition-all flex justify-center items-center">
                            {evaluating ? <span className="animate-spin text-xl">⏳</span> : 'ส่งประเมินผล'}
                        </button>
                    </div>
                </div>
            );
        }

        // ==========================================
        // Common UI Components
        // ==========================================
        function TrainerStatus({ session, onBack }) {
            if (!session.trainer_score) return (
                <div className="flex-1 bg-white animate-fade-in flex flex-col items-center justify-center px-8 relative">
                    <button onClick={onBack} className="absolute top-8 left-6 text-textMain"><FlatIcons.ChevronLeft /></button>
                    <div className="w-32 h-32 bg-pastelGreen rounded-full flex items-center justify-center mb-6 shadow-inner-soft">
                        <span className="text-6xl drop-shadow-md">👨‍🏫</span>
                    </div>
                    <h3 className="text-2xl font-black text-textMain mb-3">Pending Review</h3>
                    <p className="text-textMuted text-center font-bold leading-relaxed">
                        ข้อมูลถูกส่งเข้าระบบแล้ว<br/>โปรดรอสัมภาษณ์สดจากเทรนเนอร์
                    </p>
                </div>
            );
            return <div className="flex-1 bg-white pt-12 px-6"><ResultScreen score={session.trainer_score} label="Trainer Score" passed={session.trainer_passed} onBack={onBack} /></div>;
        }

        function ResultScreen({ score, label, passed, onBack }) {
            return (
                <div className="text-center flex flex-col items-center relative">
                    <button onClick={onBack} className="absolute top-0 left-0 text-textMain"><FlatIcons.ChevronLeft /></button>
                    <h3 className="text-xl font-extrabold text-textMuted mb-10 uppercase tracking-widest">{label}</h3>
                    
                    {/* Circle Progress */}
                    <div className="relative w-48 h-48 mb-8">
                        <svg className="w-full h-full transform -rotate-90 drop-shadow-lg">
                            <circle cx="96" cy="96" r="80" stroke="#F0F2F8" strokeWidth="16" fill="none" />
                            <circle cx="96" cy="96" r="80" stroke={passed ? '#20C997' : '#FF6B6B'} strokeWidth="16" fill="none" strokeDasharray="502" strokeDashoffset={502 - (score/100)*502} strokeLinecap="round" className="transition-all duration-1000 ease-out" />
                        </svg>
                        <div className="absolute inset-0 flex items-center justify-center flex-col">
                            <span className="text-5xl font-black text-textMain">{score}</span>
                        </div>
                    </div>
                    <span className={`px-6 py-2 rounded-full text-sm font-black shadow-sm uppercase tracking-wider ${passed ? 'bg-pastelGreen text-green-700' : 'bg-red-50 text-red-600'}`}>
                        {passed ? 'Passed' : 'Failed'}
                    </span>
                </div>
            );
        }

        // ==========================================
        // 7. TRAINER APP (Clean UI)
        // ==========================================
        function TrainerApp({ trainer, db, updateSession }) {
            const [filterRH, setFilterRH] = useState('All');
            const [evalUser, setEvalUser] = useState(null);

            const cands = db.users.filter(u => u.role === 'Candidate' && db.sessions[u.id]);
            const filtered = filterRH === 'All' ? cands : cands.filter(c => c.rh === filterRH);
            
            if (evalUser) return <TrainerEvalScreen candidate={evalUser} session={db.sessions[evalUser.id]} trainer={trainer} rubrics={db.rubrics} updateSession={updateSession} onBack={() => setEvalUser(null)} />;

            return (
                <div className="space-y-6 animate-fade-in">
                    <div className="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                        <h2 className="text-xl font-extrabold text-brandDark">Trainer Dashboard</h2>
                        <select value={filterRH} onChange={e => setFilterRH(e.target.value)} className="bg-optGray p-2 rounded-xl font-bold text-brandBlue outline-none">
                            <option value="All">All RH</option>{Object.keys(RH_ZONES).map(r => <option key={r} value={r}>{r}</option>)}
                        </select>
                    </div>

                    <div className="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
                        <div className="p-5 border-b border-gray-50 bg-pastelBlue/30"><h3 className="font-extrabold text-brandBlue text-lg">Pending Evaluations</h3></div>
                        <div className="overflow-x-auto">
                            <table className="w-full text-left border-collapse">
                                <thead className="bg-gray-50 text-textMuted text-xs uppercase tracking-wider"><tr><th className="p-4">Candidate</th><th className="p-4">RH</th><th className="p-4">Roleplay Scenario</th><th className="p-4 text-center">Action</th></tr></thead>
                                <tbody>
                                    {filtered.filter(c => db.sessions[c.id].roleplay_passed && !db.sessions[c.id].trainer_passed).map(c => (
                                        <tr key={c.id} className="border-b border-gray-50 hover:bg-optGray transition-colors">
                                            <td className="p-4"><p className="font-bold text-textMain">{c.first_name_en}</p><p className="text-xs text-textMuted">{c.employee_id}</p></td>
                                            <td className="p-4"><span className="font-bold text-brandBlue">{c.rh}</span></td>
                                            <td className="p-4 text-sm text-gray-600 font-medium truncate max-w-xs">{db.sessions[c.id].roleplay_assigned?.target}</td>
                                            <td className="p-4 text-center"><button onClick={() => setEvalUser(c)} className="bg-brandBlue text-white font-bold px-5 py-2 rounded-xl hover:bg-blue-700 shadow-sm text-sm">Review</button></td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        function TrainerEvalScreen({ candidate, session, trainer, rubrics, updateSession, onBack }) {
            const submitScore = (score) => {
                if(confirm(`ยืนยันบันทึกคะแนน ${score}% ใช่หรือไม่?`)) {
                    updateSession(candidate.id, { trainer_score: score, trainer_passed: score >= 80, overall_status: score >= 80 ? 'CERTIFIED' : 'IN_PROGRESS' });
                    alert('บันทึกผลเรียบร้อย'); onBack();
                }
            };
            return (
                <div className="space-y-6 animate-fade-in bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                    <button onClick={onBack} className="text-textMuted font-bold mb-4">← กลับ</button>
                    <h2 className="text-2xl font-black text-brandDark mb-6">ประเมิน: {candidate.first_name_en}</h2>
                    <div className="bg-optGray p-4 rounded-2xl mb-6 text-sm"><b>Transcript:</b> {session.transcript}</div>
                    <div className="flex gap-4">
                        <button onClick={() => submitScore(50)} className="flex-1 bg-red-100 text-red-700 font-bold py-3 rounded-xl">50%</button>
                        <button onClick={() => submitScore(80)} className="flex-1 bg-green-100 text-green-700 font-bold py-3 rounded-xl">80%</button>
                        <button onClick={() => submitScore(100)} className="flex-1 bg-brandBlue text-white font-bold py-3 rounded-xl">100%</button>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 8. ADMIN APP
        // ==========================================
        function AdminApp({ db, setDb, isDbConnected }) {
            return (
                <div className="bg-white p-8 rounded-3xl shadow-sm border border-gray-100 text-center animate-fade-in">
                    <h2 className="text-2xl font-black text-brandDark mb-4">Admin Data Export</h2>
                    <p className="text-textMuted mb-8 font-bold">Total Users: {db.users.length}</p>
                    <button onClick={() => alert('Exporting...')} className="bg-green-500 text-white font-black px-8 py-4 rounded-2xl shadow-soft-3d hover:bg-green-600">Export Excel Report</button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
