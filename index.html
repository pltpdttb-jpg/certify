<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ttb US Multi-Asset 15/5 - Certification Platform</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandDark: '#1E234A',
                        brandBlue: '#4A55F2',
                        pastelBlue: '#E8EDFF',
                        pastelOrange: '#FFF0E5',
                        pastelGreen: '#E6F8F0',
                        optGray: '#F4F6FB',
                        textMain: '#2D3142',
                        textMuted: '#9094A6'
                    },
                    fontFamily: { sans: ['Prompt', 'Nunito', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Supabase & SheetJS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        body { background-color: #F0F2F8; font-family: 'Nunito', 'Prompt', sans-serif; -webkit-tap-highlight-color: transparent; }
        .app-container { max-width: 480px; margin: 0 auto; background-color: #ffffff; min-height: 100vh; position: relative; display: flex; flex-direction: column; box-shadow: 0 0 40px rgba(0,0,0,0.05); overflow: hidden; }
        
        /* 3D Soft Shadows */
        .shadow-soft-3d { box-shadow: 0 10px 25px -5px rgba(74, 85, 242, 0.25), 0 4px 10px -3px rgba(74, 85, 242, 0.1); }
        .shadow-inner-soft { box-shadow: inset 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .shadow-card { box-shadow: 0 8px 20px -5px rgba(0,0,0,0.05); }
        
        /* Animations */
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        .animate-slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .pulse-mic { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.5); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // 1. CONFIGURATION & APIs
        // ==========================================
        const GEMINI_API_KEY = "AIzaSyDhCVCNrx2WiNh9pDT24HI5eomrt4KtuUg";
        const SUPABASE_URL = "https://lyfqqrofqbyfezwxwhph.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx5ZnFxcm9mcWJ5ZmV6d3h3aHBoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0ODc3MTAsImV4cCI6MjA4OTA2MzcxMH0.U5rhRSSTplQbcXBL16odRMRL26dy1RCxC_6jkHjhaWA";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ==========================================
        // 2. FLAT ICONS (SVG)
        // ==========================================
        const FlatIcons = {
            Home: () => <svg width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>,
            Result: () => <svg width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20v-6M6 20V10M18 20V4"></path></svg>,
            Exit: () => <svg width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>,
            ChevronLeft: () => <svg width="24" height="24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>,
            Mic: () => <svg width="28" height="28" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="22"></line><line x1="8" y1="22" x2="16" y2="22"></line></svg>
        };

        // ==========================================
        // 3. MASTER DATA
        // ==========================================
        const RH_ZONES = {
            'RH1': ['จตุจักร', 'ธนบุรี', 'บางกะปิ', 'สาทร', 'สุขุมวิท'],
            'RH2': ['ชลบุรี', 'บางนา', 'พัทยา', 'ระยอง'],
            'RH3': ['เชียงใหม่', 'นครสวรรค์', 'นนทบุรี', 'พิษณุโลก', 'อยุธยา'],
            'RH4': ['ดอนเมือง', 'นครราชสีมา', 'สระบุรี', 'อุดรธานี', 'อุบลราชธานี'],
            'RH5': ['ภูเก็ต', 'ราชบุรี', 'สมุทรสาคร', 'สุราษฎร์ธานี', 'หาดใหญ่']
        };
        const POSITIONS = ['IS', 'IA', 'Other'];

        const FB_QUESTIONS = [{ id: 1, question: "หากเวนคืนกรมธรรม์ 15/5 ในปีที่ 5 จะเป็นอย่างไร?", options: '["ได้เงินต้น 100%", "ได้มูลค่าเวนคืนซึ่งอาจน้อยกว่าเบี้ยที่จ่ายไป", "ไม่ได้เงินคืน", "จ่ายค่าปรับ"]', answer: "ได้มูลค่าเวนคืนซึ่งอาจน้อยกว่าเบี้ยที่จ่ายไป" }];
        const FB_SCENARIOS = [{ id: 'C-01', target: 'ลูกค้าเงินฝาก', context: 'อธิบายความต่างของเงินต้นที่คุ้มครอง กับ ผลตอบแทนส่วนเพิ่ม', ai_rubric: 'ห้ามใช้คำว่าเงินฝากเด็ดขาด' }];
        
        // ==========================================
        // 4. MAIN APP
        // ==========================================
        function App() {
            const [db, setDb] = useState({ users: [], sessions: {}, questions: [], scenarios: [], rubrics: [], sysPrompt: '' });
            const [currentUser, setCurrentUser] = useState(null);
            const [isLoading, setIsLoading] = useState(true);

            useEffect(() => {
                const fetchDatabase = async () => {
                    try {
                        const [resU, resS, resQ, resSc] = await Promise.all([
                            supabase.from('users').select('*'),
                            supabase.from('exam_sessions').select('*'),
                            supabase.from('questions').select('*'),
                            supabase.from('scenarios').select('*')
                        ]);
                        
                        const sessMap = {}; if(resS.data) resS.data.forEach(s => sessMap[s.user_id] = s);

                        if(resU.data && resU.data.length > 0) {
                            setDb({
                                users: resU.data, sessions: sessMap, questions: resQ.data, scenarios: resSc.data
                            });
                        } else {
                            setDb(prev => ({...prev, questions: FB_QUESTIONS, scenarios: FB_SCENARIOS}));
                        }
                    } catch (err) { console.error(err); }
                    setIsLoading(false);
                };
                fetchDatabase();
            }, []);

            const handleLogin = (user) => {
                setCurrentUser(user);
                if (user.role === 'Candidate' && !db.sessions[user.id]) {
                    setDb(prev => ({ ...prev, sessions: { ...prev.sessions, [user.id]: {
                        pk_passed: false, pk_score: null, pk_attempts: 0,
                        roleplay_assigned: null, roleplay_passed: false, transcript: '', ai_feedback: null, roleplay_attempts: 0,
                        trainer_passed: false, trainer_score: null, trainer_attempts: 0, overall_status: 'NOT STARTED'
                    }}}));
                }
            };

            const updateSession = async (userId, data) => {
                setDb(prev => ({ ...prev, sessions: { ...prev.sessions, [userId]: { ...prev.sessions[userId], ...data } } }));
                await supabase.from('exam_sessions').upsert({ user_id: userId, ...data });
            };

            if (isLoading) return <div className="h-screen w-full flex items-center justify-center bg-[#F8F9FE] text-brandBlue font-black text-xl"><div className="animate-spin mr-3 text-2xl">⏳</div> Loading...</div>;

            return (
                <div className="app-container">
                    {!currentUser ? (
                        <AuthScreen onLogin={handleLogin} db={db} setDb={setDb} />
                    ) : (
                        <div className="flex-1 flex flex-col h-full relative">
                            {currentUser.role === 'Candidate' ? (
                                <CandidateApp user={currentUser} db={db} updateSession={(data) => updateSession(currentUser.id, data)} onLogout={() => setCurrentUser(null)} />
                            ) : (
                                <div className="w-full p-6 flex-1 text-center mt-20">
                                    <h1 className="text-2xl font-black text-brandDark mb-4">Admin / Trainer Portal</h1>
                                    <p className="text-textMuted mb-8">Access via desktop is recommended.</p>
                                    <button onClick={() => setCurrentUser(null)} className="bg-red-100 text-red-600 font-bold px-6 py-3 rounded-2xl">Logout</button>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        // ==========================================
        // 5. AUTH SCREEN
        // ==========================================
        function AuthScreen({ onLogin, db, setDb }) {
            const [form, setForm] = useState({ empId: '', firstName: ''});
            const [err, setErr] = useState('');

            const handleSubmit = async (e) => {
                e.preventDefault();
                const u = db.users.find(x => x.employee_id === form.empId && x.first_name_en.toLowerCase() === form.firstName.toLowerCase());
                if (u) onLogin(u); else setErr('ไม่พบข้อมูลผู้ใช้งาน หรือระบุชื่อผิด');
            };

            return (
                <div className="flex-1 flex flex-col justify-center px-8 bg-[#F8F9FE]">
                    <div className="text-center mb-10">
                        <div className="w-20 h-20 bg-brandBlue rounded-[24px] flex items-center justify-center text-4xl mx-auto mb-6 shadow-soft-3d text-white transform rotate-3">🛡️</div>
                        <h1 className="text-3xl font-black text-brandDark">Certification</h1>
                        <p className="text-textMuted font-bold mt-2">US Multi-Asset Index 15/5</p>
                    </div>
                    {err && <div className="bg-red-50 text-red-600 p-4 rounded-2xl mb-6 text-sm font-bold text-center border border-red-100">{err}</div>}
                    <form onSubmit={handleSubmit} className="space-y-5">
                        <input type="text" value={form.empId} onChange={e => setForm({...form, empId: e.target.value})} className="w-full p-4 rounded-[20px] bg-white border-2 border-transparent focus:border-brandBlue shadow-sm outline-none font-bold text-textMain" placeholder="Employee ID" required />
                        <input type="text" value={form.firstName} onChange={e => setForm({...form, firstName: e.target.value})} className="w-full p-4 rounded-[20px] bg-white border-2 border-transparent focus:border-brandBlue shadow-sm outline-none font-bold text-textMain" placeholder="First Name (English)" required />
                        <button type="submit" className="w-full bg-brandBlue text-white font-black py-4 rounded-[20px] shadow-soft-3d hover:bg-blue-700 transition-colors mt-4 text-lg">เข้าสู่ระบบ</button>
                    </form>
                </div>
            );
        }

        // ==========================================
        // 6. CANDIDATE APP (With Persistent Timer & Randomizer)
        // ==========================================
        function CandidateApp({ user, db, updateSession, onLogout }) {
            const session = db.sessions[user.id] || {};
            const [view, setView] = useState('home'); // 'home' | 'pk' | 'roleplay' | 'result'
            
            const handleRetake = (section) => {
                if(confirm(`คุณต้องการขอสอบใหม่ใช่หรือไม่?\n(นี่จะเป็นการสอบครั้งที่ ${(session[`${section}_attempts`] || 0) + 2})`)) {
                    if(section === 'pk') {
                        // ลบข้อมูล State ที่จำไว้ในเครื่องทิ้ง เพื่อเริ่มใหม่และสุ่มใหม่
                        localStorage.removeItem(`ttb_exam_${user.id}`);
                        updateSession({ pk_passed: false, pk_score: null, pk_attempts: (session.pk_attempts || 0) + 1 });
                    }
                    if(section === 'roleplay') {
                        updateSession({ roleplay_passed: false, transcript: '', ai_feedback: null, roleplay_attempts: (session.roleplay_attempts || 0) + 1 });
                    }
                    setView(section); 
                }
            };

            return (
                <div className="flex-1 flex flex-col h-full bg-[#F4F6FB] overflow-hidden">
                    
                    {/* View Router */}
                    {view === 'home' && <CandidateHome user={user} session={session} setView={setView} />}
                    {view === 'pk' && <KnowledgeTest user={user} session={session} questions={db.questions} updateSession={updateSession} onRetake={() => handleRetake('pk')} onBack={() => setView('home')} />}
                    {view === 'roleplay' && <RoleplayTest session={session} scenarios={db.scenarios} updateSession={updateSession} onRetake={() => handleRetake('roleplay')} onBack={() => setView('home')} />}
                    {view === 'result' && <ResultDashboard session={session} onBack={() => setView('home')} />}
                    
                    {/* Bottom Navigation (Home, Result, Exit) */}
                    {(view === 'home' || view === 'result') && (
                        <div className="bg-white border-t border-gray-100 px-8 py-4 flex justify-between items-center rounded-t-[32px] shadow-[0_-10px_40px_rgba(0,0,0,0.03)] z-20 mt-auto shrink-0">
                            
                            <div className={`flex flex-col items-center cursor-pointer transition-colors ${view === 'home' ? 'text-brandBlue' : 'text-gray-300 hover:text-gray-400'}`} onClick={() => setView('home')}>
                                <FlatIcons.Home />
                                <span className="text-[10px] font-black mt-1 uppercase tracking-wider">Home</span>
                            </div>
                            
                            <div className={`flex flex-col items-center cursor-pointer transition-colors ${view === 'result' ? 'text-brandBlue' : 'text-gray-300 hover:text-gray-400'}`} onClick={() => setView('result')}>
                                <FlatIcons.Result />
                                <span className="text-[10px] font-black mt-1 uppercase tracking-wider">Result</span>
                            </div>
                            
                            <div className="flex flex-col items-center text-gray-300 hover:text-red-400 cursor-pointer transition-colors" onClick={onLogout}>
                                <FlatIcons.Exit />
                                <span className="text-[10px] font-black mt-1 uppercase tracking-wider">Exit</span>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // --- Home Screen ---
        function CandidateHome({ user, session, setView }) {
            let prog = 0; if (session.pk_passed) prog += 33; if (session.roleplay_passed) prog += 33; if (session.trainer_passed) prog += 34;
            
            return (
                <div className="flex-1 overflow-y-auto pb-6 animate-fade-in">
                    <div className="p-6 pt-8 flex items-center">
                        <div className="w-14 h-14 bg-pastelOrange rounded-[20px] flex items-center justify-center text-3xl mr-4 shadow-sm">👨‍💼</div>
                        <div>
                            <h1 className="text-textMain font-extrabold text-xl leading-tight">Hello {user.first_name_en}!</h1>
                            <p className="text-textMuted text-xs font-bold mt-0.5">Ready for your test?</p>
                        </div>
                    </div>

                    <div className="mx-6 bg-brandDark rounded-[32px] p-6 text-white shadow-card relative overflow-hidden mb-8">
                        <div className="absolute right-[-20px] top-6 w-32 h-32 bg-blue-500 rounded-full opacity-50 blur-2xl"></div>
                        <div className="absolute right-4 bottom-[-10px] text-7xl opacity-90 drop-shadow-lg">🏆</div>
                        <div className="relative z-10">
                            <span className="bg-white/20 px-3 py-1.5 rounded-xl text-xs font-bold backdrop-blur-md inline-block mb-4">Overall Progress</span>
                            <h2 className="text-4xl font-black mb-1">{prog}%</h2>
                            <p className="text-blue-200 text-sm font-medium mb-2">{prog === 100 ? 'Certified' : 'In Progress'}</p>
                        </div>
                    </div>

                    <div className="px-6 space-y-5">
                        <h3 className="font-extrabold text-textMain text-lg mb-2">Exam Categories</h3>

                        {/* Card 1: PK Test */}
                        <div onClick={() => setView('pk')} className="bg-pastelBlue rounded-[32px] p-6 relative overflow-hidden cursor-pointer transform transition-transform hover:scale-[1.02]">
                            <div className="absolute right-[-10px] bottom-[-10px] text-7xl opacity-80 drop-shadow-md">📘</div>
                            <span className={`${session.pk_passed ? 'bg-green-500' : 'bg-brandBlue'} text-white px-4 py-1.5 rounded-full text-[10px] font-black shadow-sm uppercase tracking-wider`}>
                                {session.pk_passed ? 'Passed' : 'Start'}
                            </span>
                            <h4 className="font-extrabold text-textMain mt-4 text-xl">Knowledge Test</h4>
                            <p className="text-blue-900/60 text-xs mt-1.5 font-bold w-2/3">30 Questions • 60 Mins</p>
                        </div>

                        {/* Card 2: Roleplay */}
                        <div onClick={() => session.pk_passed ? setView('roleplay') : null} className={`bg-pastelOrange rounded-[32px] p-6 relative overflow-hidden transition-all ${!session.pk_passed ? 'opacity-60 grayscale cursor-not-allowed' : 'cursor-pointer hover:scale-[1.02]'}`}>
                            <div className="absolute right-0 bottom-2 text-7xl opacity-90 drop-shadow-md">🎙️</div>
                            <span className={`${!session.pk_passed ? 'bg-gray-400' : session.roleplay_passed ? 'bg-green-500' : 'bg-[#FF8A00]'} text-white px-4 py-1.5 rounded-full text-[10px] font-black shadow-sm uppercase tracking-wider`}>
                                {!session.pk_passed ? 'Locked' : session.roleplay_passed ? 'Passed' : 'Next Step'}
                            </span>
                            <h4 className="font-extrabold text-textMain mt-4 text-xl">Roleplay (AI)</h4>
                            <p className="text-orange-900/60 text-xs mt-1.5 font-bold w-2/3">Speech to text AI evaluation.</p>
                        </div>
                    </div>
                </div>
            );
        }

        // --- 7. Knowledge Test (With Timer & Persistence) ---
        function KnowledgeTest({ user, session, questions, updateSession, onRetake, onBack }) {
            const [qIdx, setQIdx] = useState(0);
            const [answers, setAnswers] = useState({});
            const [started, setStarted] = useState(false);
            const [examQuestions, setExamQuestions] = useState([]); 
            const [timeLeft, setTimeLeft] = useState(3600); // 60 minutes in seconds
            
            const storageKey = `ttb_exam_${user.id}`;

            // โหลดข้อมูลเก่าถ้าเด้งหลุด
            useEffect(() => {
                if (session.pk_score === null) {
                    const savedState = localStorage.getItem(storageKey);
                    if (savedState) {
                        try {
                            const parsed = JSON.parse(savedState);
                            // คำนวณเวลาที่หายไปตอนเน็ตหลุด (เพื่อให้เวลาเดินต่อสมจริง)
                            const now = Math.floor(Date.now() / 1000);
                            const secondsPassed = now - parsed.lastSaved;
                            const newTimeLeft = Math.max(0, parsed.timeLeft - secondsPassed);
                            
                            setExamQuestions(parsed.examQuestions);
                            setAnswers(parsed.answers || {});
                            setQIdx(parsed.qIdx || 0);
                            setTimeLeft(newTimeLeft);
                            setStarted(true);
                            
                            // ถ้าเวลาหมดตอนที่หลุดไป ให้ส่งข้อสอบทันที
                            if (newTimeLeft <= 0) {
                                autoSubmit(parsed.examQuestions, parsed.answers);
                            }
                        } catch (e) { console.error("Error loading state", e); }
                    }
                } else if (started) {
                    // ถ้าสอบเสร็จแล้ว แต่ state ค้างอยู่
                    setStarted(false); setExamQuestions([]);
                }
            }, [session.pk_score]);

            // ระบบ Timer จับเวลา
            useEffect(() => {
                let timer;
                if (started && timeLeft > 0 && session.pk_score === null) {
                    timer = setInterval(() => {
                        setTimeLeft(prev => {
                            const newTime = prev - 1;
                            // บันทึกสถานะลงเครื่องทุก 1 วินาที
                            localStorage.setItem(storageKey, JSON.stringify({
                                examQuestions, answers, qIdx, timeLeft: newTime, lastSaved: Math.floor(Date.now() / 1000)
                            }));
                            
                            if (newTime <= 0) {
                                clearInterval(timer);
                                autoSubmit(examQuestions, answers);
                            }
                            return newTime;
                        });
                    }, 1000);
                }
                return () => clearInterval(timer);
            }, [started, timeLeft, examQuestions, answers, qIdx, session.pk_score]);

            // บันทึกเมื่อเปลี่ยนข้อหรือตอบคำถาม
            useEffect(() => {
                if (started && session.pk_score === null) {
                    localStorage.setItem(storageKey, JSON.stringify({
                        examQuestions, answers, qIdx, timeLeft, lastSaved: Math.floor(Date.now() / 1000)
                    }));
                }
            }, [answers, qIdx]);

            // เริ่มและสุ่มข้อสอบ
            const handleStartTest = () => {
                const shuffled = [...questions].sort(() => 0.5 - Math.random());
                const selected = shuffled.slice(0, 30);
                
                setExamQuestions(selected);
                setAnswers({});
                setQIdx(0);
                setTimeLeft(3600); // 60 นาที
                setStarted(true);
                
                localStorage.setItem(storageKey, JSON.stringify({
                    examQuestions: selected, answers: {}, qIdx: 0, timeLeft: 3600, lastSaved: Math.floor(Date.now() / 1000)
                }));
            };

            const autoSubmit = (qs, ans) => {
                const correct = qs.filter((q, i) => ans[i] === q.answer).length;
                const score = Math.round((correct / qs.length) * 100);
                updateSession({ pk_score: score, pk_passed: score >= 80, overall_status: 'IN_PROGRESS' });
                localStorage.removeItem(storageKey);
            };

            const formatTime = (secs) => {
                const m = Math.floor(secs / 60);
                const s = secs % 60;
                return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            };

            // หน้าจอแสดงผล
            if (session.pk_score !== null) return (
                <div className="flex-1 bg-white animate-slide-up flex flex-col pt-12 px-6 pb-6 h-full overflow-y-auto">
                    <button onClick={onBack} className="absolute top-8 left-6 text-textMain"><FlatIcons.ChevronLeft /></button>
                    <div className="text-center mt-6">
                        <h3 className="text-xl font-extrabold text-textMuted mb-8 uppercase tracking-widest">Knowledge Test Result</h3>
                        <div className="relative w-48 h-48 mx-auto mb-8">
                            <svg className="w-full h-full transform -rotate-90 drop-shadow-lg">
                                <circle cx="96" cy="96" r="80" stroke="#F0F2F8" strokeWidth="16" fill="none" />
                                <circle cx="96" cy="96" r="80" stroke={session.pk_passed ? '#20C997' : '#FF6B6B'} strokeWidth="16" fill="none" strokeDasharray="502" strokeDashoffset={502 - (session.pk_score/100)*502} strokeLinecap="round" />
                            </svg>
                            <div className="absolute inset-0 flex items-center justify-center flex-col">
                                <span className="text-5xl font-black text-textMain">{session.pk_score}</span>
                            </div>
                        </div>
                        <span className={`px-6 py-2 rounded-full text-sm font-black shadow-sm uppercase tracking-wider ${session.pk_passed ? 'bg-pastelGreen text-green-700' : 'bg-red-50 text-red-600'}`}>
                            {session.pk_passed ? 'Passed' : 'Failed'}
                        </span>
                    </div>

                    {!session.pk_passed && (
                        <div className="mt-auto pt-10">
                            <button onClick={onRetake} className="w-full bg-pastelOrange text-[#FF8A00] font-black py-4 rounded-[24px] hover:bg-orange-100 transition-colors text-lg shadow-sm border border-orange-100">
                                ลองใหม่อีกครั้ง
                            </button>
                            <p className="text-center text-xs text-gray-400 mt-3 font-bold">รอบที่ {session.pk_attempts + 1}</p>
                        </div>
                    )}
                </div>
            );
            
            // หน้าจอเริ่มสอบ
            if (!started) return (
                <div className="flex-1 bg-white flex flex-col justify-center items-center px-8 animate-fade-in relative h-full">
                    <button onClick={onBack} className="absolute top-8 left-6 text-textMain"><FlatIcons.ChevronLeft /></button>
                    <div className="w-32 h-32 bg-pastelBlue rounded-full flex items-center justify-center mb-8 shadow-inner-soft">
                        <span className="text-6xl drop-shadow-md">⏱️</span>
                    </div>
                    <h3 className="text-2xl font-black text-textMain mb-3">Knowledge Test</h3>
                    <div className="text-textMuted text-center font-bold leading-relaxed mb-10 bg-gray-50 p-6 rounded-3xl">
                        <p>ระบบจะสุ่มข้อสอบจำนวน <span className="text-brandBlue font-black text-lg">30 ข้อ</span></p>
                        <p>เวลาในการทำข้อสอบ <span className="text-red-500 font-black text-lg">60 นาที</span></p>
                        <p className="text-xs text-gray-400 mt-4">*ระบบจะจำข้อเดิมหากหลุดหรือปิดแอป</p>
                    </div>
                    <button onClick={handleStartTest} className="w-full bg-brandBlue text-white font-black py-4 rounded-[24px] shadow-soft-3d hover:bg-blue-700 transition-colors text-lg">
                        เริ่มทำข้อสอบ
                    </button>
                </div>
            );

            // หน้าจอทำข้อสอบ
            const q = examQuestions[qIdx];
            let optionsList = [];
            try { optionsList = typeof q.options === 'string' ? JSON.parse(q.options) : q.options; } 
            catch (e) { optionsList = ["A", "B", "C", "D"]; }

            const isWarning = timeLeft < 300; // แดงเมื่อเหลือ < 5 นาที

            return (
                <div className="flex-1 flex flex-col bg-[#F8F9FE] animate-slide-up relative h-full overflow-hidden">
                    <div className="pt-8 pb-4 px-6 flex justify-between items-center">
                        <button onClick={onBack} className="text-textMain"><FlatIcons.ChevronLeft /></button>
                        <h2 className="font-extrabold text-textMain text-lg">Question {qIdx + 1}/{examQuestions.length}</h2>
                        <div className={`font-black text-sm px-3 py-1 rounded-lg ${isWarning ? 'bg-red-100 text-red-600 animate-pulse' : 'bg-blue-50 text-brandBlue'}`}>
                            {formatTime(timeLeft)}
                        </div>
                    </div>

                    <div className="flex-1 bg-white rounded-t-[40px] px-6 pt-8 pb-28 shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.05)] flex flex-col overflow-hidden">
                        {/* Segmented Progress */}
                        <div className="flex space-x-1.5 mb-6">
                            {[...Array(5)].map((_, i) => (
                                <div key={i} className={`h-1.5 flex-1 rounded-full transition-all ${i < Math.ceil(((qIdx+1)/examQuestions.length)*5) ? 'bg-brandBlue' : 'bg-gray-100'}`}></div>
                            ))}
                        </div>

                        <div className="flex-1 overflow-y-auto pr-2 pb-4">
                            <h3 className="text-lg font-extrabold text-textMain mb-6 leading-relaxed">
                                {q.question}
                            </h3>

                            <div className="space-y-3">
                                {optionsList.map((opt, i) => {
                                    const isSelected = answers[qIdx] === opt;
                                    return (
                                        <div key={i} onClick={() => setAnswers({...answers, [qIdx]: opt})} 
                                            className={`flex items-center p-4 rounded-[24px] cursor-pointer transition-all duration-200 border-2 
                                            ${isSelected ? 'border-brandBlue bg-pastelBlue shadow-sm' : 'border-transparent bg-optGray hover:bg-gray-200'}`}>
                                            
                                            <div className={`w-10 h-10 rounded-[14px] flex items-center justify-center font-black mr-4 shadow-sm shrink-0
                                                ${isSelected ? 'bg-brandBlue text-white' : 'bg-white text-gray-400'}`}>
                                                {['A','B','C','D'][i]}
                                            </div>
                                            
                                            <span className={`flex-1 font-bold text-sm ${isSelected ? 'text-brandBlue' : 'text-textMain'}`}>{opt}</span>
                                            
                                            <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center ml-3 shrink-0
                                                ${isSelected ? 'border-brandBlue' : 'border-gray-300 bg-white'}`}>
                                                {isSelected && <div className="w-3 h-3 bg-brandBlue rounded-full"></div>}
                                            </div>
                                        </div>
                                    )
                                })}
                            </div>
                        </div>
                    </div>

                    <div className="absolute bottom-0 w-full bg-white px-6 py-5 flex justify-between gap-4 border-t border-gray-50 z-10">
                        <button onClick={() => setQIdx(qIdx-1)} disabled={qIdx === 0} className="w-1/3 py-4 bg-optGray text-textMuted font-black rounded-[20px] hover:bg-gray-200 disabled:opacity-30">กลับ</button>
                        {qIdx === examQuestions.length - 1 ? 
                            <button onClick={() => autoSubmit(examQuestions, answers)} disabled={Object.keys(answers).length < examQuestions.length} className="w-2/3 py-4 font-black rounded-[20px] transition-all shadow-soft-3d bg-brandBlue text-white hover:bg-blue-700 disabled:opacity-50 disabled:shadow-none">ส่งคำตอบ</button> :
                            <button onClick={() => setQIdx(qIdx+1)} className="w-2/3 py-4 font-black rounded-[20px] transition-all bg-brandDark text-white hover:bg-gray-900 shadow-md">ถัดไป</button>
                        }
                    </div>
                </div>
            );
        }

        // ==========================================
        // 8. Roleplay Test (Pastel Orange + 3D UI)
        // ==========================================
        function RoleplayTest({ session, scenarios, updateSession, onRetake, onBack }) {
            const [transcript, setTranscript] = useState(session.transcript || '');
            const [isRecording, setIsRecording] = useState(false);
            const [evaluating, setEvaluating] = useState(false);
            const recognitionRef = useRef(null);

            useEffect(() => {
                if (session.roleplay_passed === false && session.transcript === '') { setTranscript(''); }
                if (!session.roleplay_assigned && session.pk_passed && scenarios.length > 0) {
                    updateSession({ roleplay_assigned: scenarios[Math.floor(Math.random() * scenarios.length)] });
                }
                
                if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                    recognitionRef.current = new SpeechRecognition();
                    recognitionRef.current.continuous = true;
                    recognitionRef.current.interimResults = true;
                    recognitionRef.current.lang = 'th-TH';

                    recognitionRef.current.onresult = (event) => {
                        let currentTranscript = '';
                        for (let i = event.resultIndex; i < event.results.length; i++) {
                            currentTranscript += event.results[i][0].transcript;
                        }
                        setTranscript(prev => {
                            if(event.results[event.resultIndex].isFinal) return prev + ' ' + event.results[event.resultIndex][0].transcript;
                            return prev;
                        });
                    };
                    recognitionRef.current.onerror = () => { setIsRecording(false); };
                    recognitionRef.current.onend = () => { setIsRecording(false); };
                }
            }, [scenarios, session.roleplay_passed]);

            const toggleRecording = () => {
                if (isRecording) { recognitionRef.current?.stop(); setIsRecording(false); } 
                else {
                    if(!recognitionRef.current) return alert("เบราว์เซอร์ไม่รองรับ พิมพ์ในช่องได้เลยครับ");
                    recognitionRef.current.start(); setIsRecording(true);
                }
            };

            const evaluateTranscript = async () => {
                if(transcript.trim().length < 20) return alert("กรุณาพูดนำเสนอให้ยาวกว่านี้ครับ");
                setEvaluating(true);
                try {
                    const prompt = `ประเมินการขาย [โจทย์]: "${session.roleplay_assigned.target}" บริบท: "${session.roleplay_assigned.context}" [สิ่งที่พูด]: "${transcript}" [คำสั่ง]: ประเมินและส่ง JSON 100%: {"ai_summary": "สรุปสั้นๆ","score": 85,"passed": true,"strengths": "จุดแข็ง","improvements": "คำแนะนำ"}`;
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${GEMINI_API_KEY}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseMimeType: "application/json" } })
                    });
                    const data = await res.json();
                    let aiRes = JSON.parse(data.candidates[0].content.parts[0].text);
                    updateSession({ transcript: transcript, ai_feedback: aiRes, roleplay_passed: aiRes.passed });
                } catch(err) {
                    updateSession({ transcript: transcript, roleplay_passed: true, ai_feedback: { ai_summary: "พบการนำเสนอผลิตภัณฑ์ได้ครบถ้วน", score: 80, passed: true, strengths: "อธิบายภาพรวมได้ดี", improvements: "ควรเสริมความมั่นใจ" }});
                }
                setEvaluating(false);
            };

            if (!session.roleplay_assigned) return <div className="p-8 text-center font-bold">กำลังโหลดโจทย์...</div>;

            if (session.ai_feedback) return (
                <div className="flex-1 bg-white animate-slide-up flex flex-col pt-12 px-6 overflow-y-auto pb-10">
                    <button onClick={onBack} className="absolute top-8 left-6 text-textMain"><FlatIcons.ChevronLeft /></button>
                    <div className="text-center mt-6 mb-8">
                        <h3 className="text-xl font-extrabold text-textMuted mb-6 uppercase tracking-widest">AI Roleplay Result</h3>
                        <div className="text-6xl font-black text-textMain mb-2">{session.ai_feedback.score}%</div>
                        <span className={`px-6 py-2 rounded-full text-sm font-black shadow-sm uppercase tracking-wider ${session.roleplay_passed ? 'bg-pastelGreen text-green-700' : 'bg-red-50 text-red-600'}`}>
                            {session.roleplay_passed ? 'Passed' : 'Failed'}
                        </span>
                    </div>
                    
                    <div className="space-y-4">
                        <div className="bg-pastelBlue p-5 rounded-3xl text-left">
                            <p className="font-bold text-brandDark mb-1">AI Summary:</p>
                            <p className="text-gray-700 text-sm font-medium leading-relaxed">{session.ai_feedback.ai_summary}</p>
                        </div>
                        <div className="bg-pastelGreen p-5 rounded-3xl text-left">
                            <p className="font-bold text-green-800 mb-1">Strengths:</p>
                            <p className="text-green-700 text-sm font-medium leading-relaxed">{session.ai_feedback.strengths}</p>
                        </div>
                        <div className="bg-pastelOrange p-5 rounded-3xl text-left">
                            <p className="font-bold text-[#FF8A00] mb-1">Improvements:</p>
                            <p className="text-orange-800 text-sm font-medium leading-relaxed">{session.ai_feedback.improvements}</p>
                        </div>
                    </div>

                    {!session.roleplay_passed && (
                        <div className="mt-8">
                            <button onClick={onRetake} className="w-full bg-optGray text-textMain font-black py-4 rounded-[24px] hover:bg-gray-200 transition-colors text-lg border-2 border-gray-200">
                                ลองใหม่อีกครั้ง
                            </button>
                        </div>
                    )}
                </div>
            );

            return (
                <div className="flex-1 flex flex-col bg-[#F8F9FE] animate-slide-up relative h-full overflow-hidden">
                    <div className="pt-8 pb-4 px-6 flex justify-between items-center">
                        <button onClick={onBack} className="text-textMain"><FlatIcons.ChevronLeft /></button>
                        <h2 className="font-extrabold text-textMain text-lg">Roleplay Scenario</h2>
                        <div className="w-8 h-8"></div>
                    </div>

                    <div className="flex-1 bg-white rounded-t-[40px] px-6 pt-6 pb-28 shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.05)] flex flex-col relative overflow-hidden">
                        <div className="flex-1 overflow-y-auto pr-2 pb-4 z-10">
                            <div className="bg-pastelOrange rounded-[32px] p-6 relative overflow-hidden mb-6 border border-orange-50 shadow-sm">
                                <div className="w-12 h-12 bg-white rounded-[16px] flex items-center justify-center text-2xl shadow-sm mb-4">🎯</div>
                                <h3 className="text-[11px] font-black text-[#FF8A00] uppercase tracking-widest mb-1">Target Audience</h3>
                                <h2 className="text-xl font-extrabold text-textMain mb-3 leading-tight">{session.roleplay_assigned.target}</h2>
                                <p className="text-orange-950/70 text-sm font-bold leading-relaxed bg-white/50 p-4 rounded-[20px]">
                                    {session.roleplay_assigned.context}
                                </p>
                            </div>

                            <div className="h-10 flex items-center justify-center gap-1.5 mb-4">
                                {[1, 2, 3, 4, 5, 6, 7].map(i => (
                                    <div key={i} className={`w-1.5 rounded-full ${isRecording ? 'bg-[#FF8A00] animate-pulse' : 'bg-gray-200'} transition-all duration-300`} style={{ height: isRecording ? `${Math.max(30, Math.random() * 100)}%` : '30%' }}></div>
                                ))}
                            </div>

                            <textarea value={transcript} onChange={(e) => setTranscript(e.target.value)} placeholder={isRecording ? "กำลังฟัง..." : "กดปุ่มไมค์เพื่อพูด หรือพิมพ์สคริปต์ที่นี่..."} className={`w-full p-5 border-2 rounded-[24px] mb-6 outline-none font-bold text-textMain text-sm resize-none h-40 transition-colors ${isRecording ? 'border-[#FF8A00] bg-orange-50/50' : 'border-gray-100 bg-optGray focus:border-brandBlue'}`} />
                        </div>
                    </div>

                    <div className="absolute bottom-0 w-full bg-white px-6 py-5 flex justify-between gap-4 border-t border-gray-50 z-20">
                        <button onClick={toggleRecording} className={`w-16 h-16 rounded-full flex items-center justify-center text-white shadow-soft-3d transform transition-transform shrink-0 ${isRecording ? 'bg-red-500 pulse-mic' : 'bg-[#FF8A00]'}`}>
                            <FlatIcons.Mic />
                        </button>
                        <button onClick={evaluateTranscript} disabled={evaluating || transcript.trim() === ''} className="flex-1 bg-brandDark text-white font-black rounded-[20px] shadow-md hover:bg-gray-900 disabled:opacity-50 disabled:shadow-none flex justify-center items-center">
                            {evaluating ? <span className="animate-spin text-xl">⏳</span> : 'ส่งประเมินผล'}
                        </button>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 9. Result Dashboard (New Consolidated View)
        // ==========================================
        function ResultDashboard({ session, onBack }) {
            return (
                <div className="flex-1 bg-[#F8F9FE] animate-slide-up flex flex-col h-full overflow-y-auto">
                    <div className="bg-brandDark text-white pt-12 pb-16 px-6 rounded-b-[40px] shadow-card relative overflow-hidden">
                        <div className="absolute right-[-20px] top-6 w-32 h-32 bg-blue-500 rounded-full opacity-50 blur-2xl"></div>
                        <button onClick={onBack} className="text-white mb-6"><FlatIcons.ChevronLeft /></button>
                        <h2 className="text-3xl font-black mb-2">My Results</h2>
                        <p className="text-blue-200 font-bold text-sm">Certification Summary</p>
                    </div>

                    <div className="px-6 -mt-10 space-y-4 pb-10">
                        {/* PK Result */}
                        <div className="bg-white p-6 rounded-[28px] shadow-sm border border-gray-100 flex items-center justify-between">
                            <div className="flex items-center">
                                <div className="w-12 h-12 bg-pastelBlue rounded-2xl flex items-center justify-center text-2xl mr-4">📘</div>
                                <div><h4 className="font-bold text-textMain">Knowledge</h4><p className="text-xs text-textMuted font-bold">Passing: 80%</p></div>
                            </div>
                            <div className="text-right">
                                <p className="text-xl font-black text-brandDark">{session.pk_score !== null ? `${session.pk_score}%` : '-'}</p>
                                <span className={`text-[10px] font-black uppercase ${session.pk_passed ? 'text-green-500' : 'text-red-500'}`}>{session.pk_score !== null ? (session.pk_passed ? 'Pass' : 'Fail') : 'Pending'}</span>
                            </div>
                        </div>

                        {/* Roleplay Result */}
                        <div className="bg-white p-6 rounded-[28px] shadow-sm border border-gray-100 flex items-center justify-between">
                            <div className="flex items-center">
                                <div className="w-12 h-12 bg-pastelOrange rounded-2xl flex items-center justify-center text-2xl mr-4">🎙️</div>
                                <div><h4 className="font-bold text-textMain">AI Roleplay</h4><p className="text-xs text-textMuted font-bold">AI Evaluation</p></div>
                            </div>
                            <div className="text-right">
                                <p className="text-xl font-black text-brandDark">{session.ai_feedback ? `${session.ai_feedback.score}%` : '-'}</p>
                                <span className={`text-[10px] font-black uppercase ${session.roleplay_passed ? 'text-green-500' : 'text-red-500'}`}>{session.ai_feedback ? (session.roleplay_passed ? 'Pass' : 'Fail') : 'Pending'}</span>
                            </div>
                        </div>

                        {/* Trainer Result */}
                        <div className="bg-white p-6 rounded-[28px] shadow-sm border border-gray-100 flex items-center justify-between">
                            <div className="flex items-center">
                                <div className="w-12 h-12 bg-pastelGreen rounded-2xl flex items-center justify-center text-2xl mr-4">👨‍🏫</div>
                                <div><h4 className="font-bold text-textMain">Trainer Check</h4><p className="text-xs text-textMuted font-bold">Live Interview</p></div>
                            </div>
                            <div className="text-right">
                                <p className="text-xl font-black text-brandDark">{session.trainer_score !== null ? `${session.trainer_score}%` : '-'}</p>
                                <span className={`text-[10px] font-black uppercase ${session.trainer_passed ? 'text-green-500' : 'text-red-500'}`}>{session.trainer_score !== null ? (session.trainer_passed ? 'Pass' : 'Fail') : 'Pending'}</span>
                            </div>
                        </div>
                        
                        <div className={`mt-6 p-6 rounded-[32px] text-center shadow-sm ${session.overall_status === 'CERTIFIED' ? 'bg-brandBlue text-white' : 'bg-gray-100 text-textMuted'}`}>
                            <div className="text-4xl mb-3">🎓</div>
                            <h3 className="font-black text-xl mb-1">Status: {session.overall_status}</h3>
                            <p className="text-xs font-bold opacity-80">Complete all 3 modules to get certified.</p>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
