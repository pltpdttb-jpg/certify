        // ==========================================
        // 4. MAIN APP COMPONENT
        // ==========================================
        function App() {
            const [users, setUsers] = useState(DEFAULT_USERS);
            const [currentUser, setCurrentUser] = useState(null);
            const [sessions, setSessions] = useState({});
            const [isSupabaseReady, setIsSupabaseReady] = useState(false);

            // Attempt to load from Supabase on start
            useEffect(() => {
                const initDB = async () => {
                    try {
                        const { data, error } = await supabase.from('users').select('*');
                        if (!error && data.length > 0) {
                            setUsers(data);
                            setIsSupabaseReady(true);
                            // Also load sessions
                            const { data: sessData } = await supabase.from('exam_sessions').select('*');
                            if(sessData) {
                                const sessObj = {};
                                sessData.forEach(s => sessObj[s.user_id] = s);
                                setSessions(sessObj);
                            }
                        } else {
                            console.warn("Supabase tables not found or empty. Using in-memory fallback.");
                        }
                    } catch (err) {
                        console.warn("Supabase connection failed. Using in-memory fallback.");
                    }
                };
                initDB();
            }, []);

            const handleLogin = (user) => {
                setCurrentUser(user);
                // Init session if Candidate
                if (user.role === 'Candidate' && !sessions[user.id]) {
                    setSessions(prev => ({
                        ...prev,
                        [user.id]: {
                            pk_passed: false, pk_score: null, pk_attempts: 0,
                            roleplay_assigned: null, roleplay_passed: false, roleplay_link: null, ai_feedback: null, roleplay_attempts: 0,
                            trainer_passed: false, trainer_score: null, trainer_attempts: 0,
                            overall_status: 'IN_PROGRESS'
                        }
                    }));
                }
            };

            const updateSessionData = async (userId, data) => {
                const newSessions = { ...sessions, [userId]: { ...sessions[userId], ...data } };
                setSessions(newSessions);
                if (isSupabaseReady) {
                    await supabase.from('exam_sessions').upsert({ user_id: userId, ...data });
                }
            };

            return (

                                        </div>
                                    </div>
                                </div>

        // ==========================================
        // 5. AUTH SCREEN
        // ==========================================
        function AuthScreen({ onLogin, users, setUsers, isSupabaseReady }) {
            const [isRegistering, setIsRegistering] = useState(false);
            const [form, setForm] = useState({ empId: '', firstName: '', lastName: '', position: 'IS', rh: '', zone: '' });
            const [error, setError] = useState('');

            const handleChange = (e) => setForm({...form, [e.target.name]: e.target.value});

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!isRegistering) {
                    const user = users.find(u => u.employee_id === form.empId && u.first_name_en.toLowerCase() === form.firstName.toLowerCase());
                    if (user) onLogin(user); else setError('ไม่พบข้อมูล หรือระบุชื่อผิด');
                } else {
                    if (users.find(u => u.employee_id === form.empId)) return setError('Employee ID นี้ถูกใช้งานแล้ว');
                    if (!form.rh || !form.zone) return setError('กรุณาเลือก Region และ Zone ให้ครบถ้วน');
                    
                    const newUser = { id: form.empId, employee_id: form.empId, first_name_en: form.firstName, last_name_en: form.lastName, role: 'Candidate', position: form.position, rh: form.rh, zone: form.zone };
                    setUsers([...users, newUser]);
                    if(isSupabaseReady) await supabase.from('users').insert([newUser]);
                    
                    alert('ลงทะเบียนสำเร็จ! เข้าสู่ระบบได้เลย');
                    setIsRegistering(false); setError('');
                }

                                    <div>
                                        <label className="block text-sm font-bold text-ttbNavy mb-1">Last Name (Eng)</label>
                                        <input type="text" name="lastName" value={form.lastName} onChange={handleChange} className="w-full p-3 border rounded-xl bg-gray-50 outline-none" required />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-ttbNavy mb-1">Position</label>
                                        <select name="position" value={form.position} onChange={handleChange} className="w-full p-3 border rounded-xl bg-white outline-none">
                                            {POSITIONS.map(p => <option key={p} value={p}>{p}</option>)}

                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm font-bold text-ttbNavy mb-1">Region (RH)</label>
                                            <select name="rh" value={form.rh} onChange={(e) => setForm({...form, rh: e.target.value, zone: ''})} className="w-full p-3 border rounded-xl bg-white outline-none" required>
                                                <option value="">เลือก...</option>
                                                {Object.keys(RH_ZONES).map(r => <option key={r} value={r}>{r}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-bold text-ttbNavy mb-1">Zone (District)</label>
                                            <select name="zone" value={form.zone} onChange={handleChange} disabled={!form.rh} className="w-full p-3 border rounded-xl bg-white outline-none disabled:bg-gray-100" required>
                                                <option value="">เลือก...</option>
                                                {form.rh && RH_ZONES[form.rh].map(z => <option key={z} value={z}>{z}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                </div>
                            )}

                            <button type="submit" className="w-full bg-ttbBlue hover:bg-ttbNavy text-white font-bold py-3 rounded-xl shadow-md transition-colors mt-2">
                                {isRegistering ? 'สร้างบัญชีผู้ใช้งาน' : 'เข้าสู่ระบบ'}
                            </button>
                        </form>
                        
                        <div className="text-center mt-6">
                            <button onClick={() => {setIsRegistering(!isRegistering); setError('');}} className="text-ttbOrange font-bold text-sm hover:underline">
                                {isRegistering ? 'กลับไปหน้าเข้าสู่ระบบ' : 'ลงทะเบียนผู้ใช้งานใหม่ (Candidate)'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 6. CANDIDATE APP (Tabs & Sub-pages)
        // ==========================================
        function CandidateApp({ user, session, updateSession }) {
            const [view, setView] = useState('home'); // home, pk, roleplay, trainer
            
            const handleRetake = (section) => {
                const isConfirmed = window.confirm(`คุณต้องการสอบ ${section === 'pk' ? 'Knowledge Test' : 'Roleplay'} ใหม่อีกครั้งใช่หรือไม่?\nนี่จะเป็นการสอบครั้งที่ ${(session[`${section}_attempts`] || 0) + 2}`);
                if(isConfirmed) {
                    if(section === 'pk') updateSession({ pk_passed: false, pk_score: null, pk_attempts: session.pk_attempts + 1 });
                    if(section === 'roleplay') updateSession({ roleplay_passed: false, roleplay_link: null, ai_feedback: null, roleplay_attempts: session.roleplay_attempts + 1 });
                    setView(section);
                }
            };

            const NavButton = ({ id, label, icon }) => (
                <button onClick={() => setView(id)} className={`flex items-center px-4 py-3 rounded-lg font-bold text-sm whitespace-nowrap transition-colors mr-2 ${view === id ? 'bg-ttbNavy text-white shadow-md' : 'text-gray-600 hover:bg-gray-100'}`}>
                    <Icon path={icon} className={`w-4 h-4 mr-2 ${view === id ? 'text-ttbOrange' : ''}`} /> {label}
                </button>
            );

            return (
                <div className="space-y-6">
                    <div className="bg-white p-2 rounded-xl shadow-sm border border-gray-200 flex overflow-x-auto">
                        <NavButton id="home" label="หน้าหลัก" icon={Icons.Home} />
                        <NavButton id="pk" label="Knowledge Test" icon={Icons.Book} />
                        <NavButton id="roleplay" label="Roleplay" icon={Icons.Video} />
                        <NavButton id="trainer" label="Trainer Assessment" icon={Icons.Award} />
                    </div>

                    <div className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-gray-200 relative animate-fade-in min-h-[500px]">
                        {view !== 'home' && (
                            <button onClick={() => setView('home')} className="mb-6 text-gray-500 hover:text-ttbNavy flex items-center font-bold text-sm">
                                <Icon path={Icons.ChevronLeft} className="w-5 h-5 mr-1" /> ย้อนกลับ (Back)
                            </button>
                        )}
                        
                        {view === 'home' && <CandidateHome session={session} setView={setView} />}
                        {view === 'pk' && <KnowledgeTest session={session} updateSession={updateSession} onRetake={() => handleRetake('pk')} />}
                        {view === 'roleplay' && <RoleplayTest session={session} updateSession={updateSession} onRetake={() => handleRetake('roleplay')} />}
                        {view === 'trainer' && <TrainerStatus session={session} />}
                    </div>
                </div>
            );
        }

        function CandidateHome({ session, setView }) {
            let progress = 0;
            if (session.pk_passed) progress += 33;
            if (session.roleplay_passed) progress += 33;
            if (session.trainer_passed) progress += 34;

            const Card = ({ title, desc, icon, passed, id, disabledText }) => (
                <div className="border border-gray-200 p-6 rounded-2xl relative flex flex-col h-full hover:shadow-lg transition-shadow bg-white">
                    {passed && <div className="pass-stamp">PASS</div>}
                    <div className={`w-12 h-12 rounded-xl flex items-center justify-center mb-4 ${passed ? 'bg-green-100 text-green-600' : 'bg-ttbLightBlue text-ttbBlue'}`}>
                        <Icon path={icon} className="w-6 h-6" />
                    </div>
                    <h4 className="font-bold text-lg text-ttbNavy mb-2">{title}</h4>
                    <p className="text-sm text-gray-500 mb-6 flex-grow">{desc}</p>
                    {disabledText ? (
                        <button disabled className="w-full py-2 bg-gray-100 text-gray-400 font-bold rounded-lg cursor-not-allowed">{disabledText}</button>
                    ) : passed ? (
                        <button onClick={() => setView(id)} className="w-full py-2 bg-gray-100 text-ttbNavy font-bold rounded-lg hover:bg-gray-200 border border-gray-300">ดูผลลัพธ์</button>
                    ) : (
                        <button onClick={() => setView(id)} className="w-full py-2 bg-ttbBlue text-white font-bold rounded-lg hover:bg-ttbNavy shadow-md">เข้าทำรายการ</button>
                    )}
                </div>
            );

            return (
                <div className="space-y-8 animate-fade-in">
                    <div className="bg-gray-50 p-6 rounded-2xl border border-gray-200">
                        <div className="flex justify-between items-end mb-2">
                            <h3 className="font-bold text-ttbNavy">ความคืบหน้าการทดสอบ (Dashboard)</h3>
                            <span className="text-xl font-black text-ttbOrange">{progress}%</span>
                        </div>
                        <div className="w-full bg-gray-200 rounded-full h-3">
                            <div className="bg-gradient-to-r from-ttbBlue to-ttbOrange h-3 rounded-full transition-all duration-1000" style={{width: `${progress}%`}}></div>
                        </div>
                    </div>
                    
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <Card title="1. Knowledge Test" desc="ทดสอบความรู้ 30 ข้อ (เกณฑ์ 80%)" icon={Icons.Book} passed={session.pk_passed} id="pk" />
                        <Card title="2. Roleplay" desc="อัดวิดีโอนำเสนอและรับคำแนะนำ AI" icon={Icons.Video} passed={session.roleplay_passed} id="roleplay" disabledText={!session.pk_passed && "ต้องผ่านส่วนที่ 1 ก่อน"} />
                        <Card title="3. Trainer Assessment" desc="สัมภาษณ์สดกับเทรนเนอร์" icon={Icons.Award} passed={session.trainer_passed} id="trainer" disabledText={!session.roleplay_passed && "ต้องผ่านส่วนที่ 2 ก่อน"} />
                    </div>
                </div>
            );
        }

        function KnowledgeTest({ session, updateSession, onRetake }) {
            const [qIdx, setQIdx] = useState(0);
            const [answers, setAnswers] = useState({});
            const [started, setStarted] = useState(false);

            if (session.pk_score !== null) return <ResultScreen score={session.pk_score} label="คะแนนความรู้ผลิตภัณฑ์" passed={session.pk_passed} onRetake={onRetake} />;
            
            if (!started) return (
                <div className="text-center py-12 max-w-md mx-auto animate-fade-in">
                    <Icon path={Icons.Book} className="w-16 h-16 text-ttbBlue mx-auto mb-4" />
                    <h3 className="text-2xl font-bold text-ttbNavy mb-2">Knowledge Test</h3>
                    <p className="text-gray-600 mb-8">ข้อสอบ 5 ข้อ (Mock) เกณฑ์ผ่าน 80%</p>
                    <button onClick={() => setStarted(true)} className="w-full bg-ttbBlue hover:bg-ttbNavy text-white font-bold py-3 rounded-xl shadow-md">เริ่มทำข้อสอบ</button>
                </div>
            );

            const q = EXAM_QUESTIONS[qIdx];
            const submit = () => {
                const correct = EXAM_QUESTIONS.filter((q, i) => answers[i] === q.answer).length;
                const score = Math.round((correct / EXAM_QUESTIONS.length) * 100);
                updateSession({ pk_score: score, pk_passed: score >= 80 });
            };

            return (
                <div className="max-w-2xl mx-auto animate-fade-in">
                    <div className="flex justify-between items-center mb-6 pb-4 border-b">
                        <h3 className="font-bold text-ttbNavy">ข้อที่ {qIdx + 1} / {EXAM_QUESTIONS.length}</h3>
                        <span className="text-red-500 font-bold bg-red-50 px-3 py-1 rounded-lg flex items-center"><Icon path={Icons.Clock} className="w-4 h-4 mr-2"/> 59:59</span>
                    </div>
                    <p className="text-lg font-medium mb-6">{q.question}</p>
                    <div className="space-y-3 mb-8">
                        {q.options.map((opt, i) => (
                            <button key={i} onClick={() => setAnswers({...answers, [qIdx]: opt})} className={`w-full text-left p-4 rounded-xl border-2 transition-all flex items-center ${answers[qIdx] === opt ? 'border-ttbBlue bg-blue-50' : 'border-gray-200 hover:bg-gray-50'}`}>
                                <span className={`w-6 h-6 rounded-full flex items-center justify-center mr-3 font-bold text-sm ${answers[qIdx] === opt ? 'bg-ttbBlue text-white' : 'bg-gray-200 text-gray-600'}`}>{['A','B','C','D'][i]}</span>
                                <span className={answers[qIdx] === opt ? 'font-bold text-ttbNavy' : ''}>{opt}</span>
                            </button>
                        ))}
                    </div>
                    <div className="flex justify-between">
                        <button onClick={() => setQIdx(qIdx-1)} disabled={qIdx === 0} className="px-6 py-2 bg-gray-100 text-gray-600 font-bold rounded-lg disabled:opacity-50">ย้อนกลับ</button>
                        {qIdx === EXAM_QUESTIONS.length - 1 ? 
                            <button onClick={submit} disabled={Object.keys(answers).length < EXAM_QUESTIONS.length} className="px-8 py-2 bg-ttbOrange text-white font-bold rounded-lg disabled:opacity-50 shadow-md">ส่งคำตอบ</button> :
                            <button onClick={() => setQIdx(qIdx+1)} className="px-8 py-2 bg-ttbNavy text-white font-bold rounded-lg">ถัดไป</button>
                        }
                    </div>
                </div>
            );
        }

        function RoleplayTest({ session, updateSession, onRetake }) {
            const [link, setLink] = useState('');
            const [evaluating, setEvaluating] = useState(false);

            useEffect(() => {
                if (!session.roleplay_assigned && session.pk_passed) {
                    updateSession({ roleplay_assigned: SCENARIOS[Math.floor(Math.random() * SCENARIOS.length)] });
                }
            }, []);

            const evaluateVideo = async (e) => {
                e.preventDefault();
                setEvaluating(true);
                try {
                    const prompt = `ประเมินการนำเสนอ ttb US Multi-Asset 15/5 ให้โจทย์: "${session.roleplay_assigned.target}". 
                    ส่งผลลัพธ์เป็น JSON เท่านั้น: {"score": 85, "passed": true, "strengths": "อธิบายเงินต้น 100% ได้ดี", "improvements": "เพิ่มเปรียบเทียบเงินฝาก"}`;
                    
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${GEMINI_API_KEY}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseMimeType: "application/json" } })
                    });
                    const data = await res.json();
                    const aiRes = JSON.parse(data.candidates[0].content.parts[0].text);
                    updateSession({ roleplay_link: link, ai_feedback: aiRes, roleplay_passed: aiRes.passed });
                } catch(err) {
                    updateSession({ roleplay_link: link, roleplay_passed: true, ai_feedback: { score: 82, passed: true, strengths: "นำเสนอด้วยความมั่นใจ อธิบาย Principal Protect ได้ถูกต้อง", improvements: "ควรเน้นย้ำเรื่องเงื่อนไขเวลา 15 ปีให้ชัดเจนกว่านี้" }});
                }
                setEvaluating(false);
            };

            if (session.ai_feedback) return (
                <div className="animate-fade-in">
                    <ResultScreen score={session.ai_feedback.score} label="คะแนนของคุณ (AI)" passed={session.roleplay_passed} onRetake={onRetake} />
                    <div className="grid md:grid-cols-2 gap-6 mt-8 max-w-4xl mx-auto">
                        <div className="bg-emerald-50 p-6 rounded-xl border border-emerald-200">
                            <h4 className="font-bold text-emerald-800 flex items-center mb-2"><Icon path={Icons.Star} className="w-5 h-5 mr-2"/> จุดแข็ง</h4>
                            <p className="text-emerald-700 text-sm">{session.ai_feedback.strengths}</p>
                        </div>
                        <div className="bg-orange-50 p-6 rounded-xl border border-orange-200">
                            <h4 className="font-bold text-orange-800 flex items-center mb-2"><Icon path={Icons.Activity} className="w-5 h-5 mr-2"/> คำแนะนำเพิ่มเติม</h4>
                            <p className="text-orange-700 text-sm">{session.ai_feedback.improvements}</p>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="flex flex-col md:flex-row gap-8 animate-fade-in">
                    <div className="md:w-1/2 space-y-6">
                        <div className="bg-ttbNavy text-white p-6 rounded-xl shadow-md">
                            <p className="text-ttbOrange text-xs font-bold uppercase mb-2 flex items-center"><Icon path={Icons.CheckCircle} className="w-4 h-4 mr-1"/> โจทย์ Roleplay ถูกล็อกแล้ว</p>
                            <h3 className="text-xl font-bold mb-2">{session.roleplay_assigned?.target}</h3>
                            <p className="text-blue-100 text-sm leading-relaxed">{session.roleplay_assigned?.text}</p>
                        </div>
                        <div className="bg-gray-50 border border-gray-200 p-5 rounded-xl">
                            <h4 className="font-bold text-ttbNavy mb-3 flex items-center"><Icon path={Icons.AlertCircle} className="w-5 h-5 mr-2 text-ttbOrange"/> เงื่อนไขการอัดคลิปวิดีโอ</h4>
                            <ul className="text-sm text-gray-700 space-y-2">
                                <li>• ความยาวไม่เกิน <b className="text-red-500">3 นาที</b></li>
                                <li>• <b>ต้องเห็นหน้า</b> (เพื่อประเมินสีหน้า ท่าทาง ความมั่นใจ)</li>
                                <li>• น้ำเสียงชัดเจน ไม่มีเสียงรบกวน</li>
                            </ul>
                        </div>
                    </div>
                    <div className="md:w-1/2">
                        <div className="bg-white border border-gray-200 p-6 rounded-xl shadow-sm">
                            <div className="bg-gray-100 rounded-lg h-40 mb-6 flex flex-col items-center justify-center border-2 border-dashed border-gray-300">
                                <Icon path={Icons.Upload} className="w-8 h-8 text-gray-400 mb-2" />
                                <span className="text-sm text-gray-500 font-bold">[ภาพแสดงวิธีอัปโหลด YouTube Unlisted]</span>
                            </div>
                            <form onSubmit={evaluateVideo}>
                                <label className="block text-sm font-bold text-ttbNavy mb-2">วางลิงก์วิดีโอ (YouTube)</label>
                                <input type="url" required value={link} onChange={e => setLink(e.target.value)} placeholder="https://youtube.com/watch?v=..." className="w-full p-3 border rounded-xl mb-4 focus:ring-2 focus:ring-ttbBlue outline-none" />
                                <button type="submit" disabled={evaluating} className="w-full bg-ttbBlue hover:bg-ttbNavy text-white font-bold py-3 rounded-xl shadow-md flex justify-center items-center">
                                    {evaluating ? <span className="flex items-center"><Icon path={Icons.Refresh} className="w-5 h-5 mr-2 animate-spin"/> กำลังวิเคราะห์...</span> : 'ส่งประเมินผล'}
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            );
        }

        function TrainerStatus({ session }) {
            if (!session.trainer_score) return (
                <div className="text-center py-16 animate-fade-in">
                    <Icon path={Icons.Award} className="w-20 h-20 text-gray-300 mx-auto mb-4" />
                    <h3 className="text-2xl font-bold text-ttbNavy mb-2">สถานะ: รอการประเมิน</h3>
                    <p className="text-gray-500">โปรดรอการสัมภาษณ์สดจากเทรนเนอร์ประจำพื้นที่ของคุณ</p>
                </div>
            );
            return <ResultScreen score={session.trainer_score} label="คะแนนจาก Trainer" passed={session.trainer_passed} />;
        }

        function ResultScreen({ score, label, passed, onRetake }) {
            return (
                <div className="text-center py-8">
                    <h3 className="text-2xl font-extrabold text-ttbNavy mb-8">{label}</h3>
                    <div className="inline-block relative">
                        <svg className="w-40 h-40 transform -rotate-90">
                            <circle cx="80" cy="80" r="70" stroke="#f3f4f6" strokeWidth="12" fill="none" />
                            <circle cx="80" cy="80" r="70" stroke={passed ? '#10b981' : '#ef4444'} strokeWidth="12" fill="none" strokeDasharray="439.8" strokeDashoffset={439.8 - (score/100)*439.8} strokeLinecap="round" className="transition-all duration-1000" />
                        </svg>
                        <div className="absolute inset-0 flex items-center justify-center text-4xl font-black text-ttbNavy">{score}<span className="text-lg text-gray-400">%</span></div>
                    </div>
                    <div className="mt-6">
                        <span className={`px-4 py-2 rounded-full text-sm font-bold ${passed ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>{passed ? 'ผ่านเกณฑ์' : 'ไม่ผ่านเกณฑ์'}</span>
                    </div>
                    {!passed && onRetake && (
                        <button onClick={onRetake} className="mt-8 bg-ttbOrange hover:bg-orange-600 text-white font-bold py-3 px-8 rounded-xl shadow-md inline-flex items-center">
                            <Icon path={Icons.Refresh} className="w-5 h-5 mr-2" /> ขอทดสอบใหม่ด้วยตัวเอง
                        </button>
                    )}
                </div>
            );
        }

        // ==========================================
        // 7. TRAINER APP
        // ==========================================
        function TrainerApp({ trainer, users, sessions, updateSession }) {
            const [filterRH, setFilterRH] = useState('All');
            const [evalUser, setEvalUser] = useState(null);

            const cands = users.filter(u => u.role === 'Candidate' && sessions[u.id]);
            const filtered = filterRH === 'All' ? cands : cands.filter(c => c.rh === filterRH);
            
            if (evalUser) return <TrainerEvalScreen candidate={evalUser} session={sessions[evalUser.id]} trainer={trainer} updateSession={updateSession} onBack={() => setEvalUser(null)} />;

            return (
                <div className="space-y-6 animate-fade-in">
                    <div className="flex justify-between items-center">
                        <h2 className="text-2xl font-bold text-ttbNavy">Trainer Dashboard</h2>
                        <select value={filterRH} onChange={e => setFilterRH(e.target.value)} className="border p-2 rounded-lg font-bold text-ttbBlue outline-none shadow-sm">
                            <option value="All">ทุกสังกัด (All RH)</option>
                            {Object.keys(RH_ZONES).map(r => <option key={r} value={r}>{r}</option>)}
                        </select>
                    </div>

                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                        {[{t: "เริ่มสอบ", v: filtered.length, c: "bg-blue-50"}, {t: "ผ่าน (PASS)", v: filtered.filter(c => sessions[c.id].trainer_passed).length, c: "bg-green-50"}, 
                          {t: "รอประเมิน (Pending)", v: filtered.filter(c => sessions[c.id].roleplay_passed && !sessions[c.id].trainer_passed).length, c: "bg-red-50 border border-red-200"},
                          {t: "กำลังทำข้อสอบ", v: filtered.filter(c => !sessions[c.id].roleplay_passed).length, c: "bg-gray-50"}].map((s,i) => (
                            <div key={i} className={`p-4 rounded-xl ${s.c}`}>
                                <p className="text-xs font-bold text-gray-500">{s.t}</p><p className="text-3xl font-black text-ttbNavy">{s.v}</p>
                            </div>
                        ))}
                    </div>

                    <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                        <table className="w-full text-left">
                            <thead className="bg-ttbNavy text-white text-sm"><tr><th className="p-4">Candidate</th><th className="p-4">RH / Zone</th><th className="p-4">โจทย์ Roleplay</th><th className="p-4">Action</th></tr></thead>
                            <tbody>
                                {filtered.filter(c => sessions[c.id].roleplay_passed && !sessions[c.id].trainer_passed).map(c => (
                                    <tr key={c.id} className="border-b hover:bg-gray-50">
                                        <td className="p-4"><p className="font-bold text-ttbNavy">{c.first_name_en} {c.last_name_en}</p><p className="text-xs text-gray-500">{c.employee_id}</p></td>
                                        <td className="p-4"><span className="font-bold text-ttbBlue">{c.rh}</span> <span className="text-xs text-gray-500 bg-gray-100 px-2 py-1 rounded">{c.zone}</span></td>
                                        <td className="p-4 text-sm text-gray-600 truncate max-w-[200px]">{sessions[c.id].roleplay_assigned?.target}</td>
                                        <td className="p-4"><button onClick={() => setEvalUser(c)} className="bg-ttbOrange text-white font-bold px-4 py-2 rounded-lg hover:bg-orange-600 shadow-sm text-sm">เริ่มประเมิน</button></td>
                                    </tr>
                                ))}
                                {filtered.filter(c => sessions[c.id].roleplay_passed && !sessions[c.id].trainer_passed).length === 0 && (
                                    <tr><td colSpan="4" className="text-center p-8 text-gray-500">ไม่มีผู้รอประเมิน</td></tr>
                                )}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        function TrainerEvalScreen({ candidate, session, trainer, updateSession, onBack }) {
            const submitScore = (score) => {
                if(confirm(`ยืนยันการให้คะแนน ${score}% แก่ ${candidate.first_name_en} ใช่หรือไม่?`)) {
                    updateSession(candidate.id, { trainer_score: score, trainer_passed: score >= 80, overall_status: score >= 80 ? 'CERTIFIED' : 'IN_PROGRESS' });
                    alert('บันทึกสำเร็จ'); onBack();
                }
            };

            const Guideline = ({ q, g }) => (
                <div className="bg-gray-50 p-4 rounded-xl border border-gray-200 mb-4">
                    <p className="font-bold text-ttbNavy mb-2">{q}</p>
                    <div className="bg-yellow-50 p-3 rounded-lg border-l-4 border-yellow-400 text-sm text-yellow-800"><b>แนวการตอบ (Rule):</b> {g}</div>
                </div>
            );

            return (
                <div className="space-y-6 animate-fade-in">
                    <button onClick={onBack} className="text-gray-500 font-bold flex items-center mb-4"><Icon path={Icons.ChevronLeft} className="w-4 h-4 mr-1"/> กลับ</button>
                    <div className="bg-ttbNavy text-white p-6 rounded-xl flex justify-between items-center shadow-md">
                        <div><p className="text-ttbOrange text-xs font-bold">ประเมินผู้สอบ</p><h2 className="text-2xl font-bold">{candidate.first_name_en} {candidate.last_name_en}</h2></div>
                        <div className="text-right text-sm">RH: {candidate.rh}</div>
                    </div>
                    
                    <div className="grid md:grid-cols-2 gap-6">
                        <div>
                            <div className="bg-gray-900 rounded-xl aspect-video flex items-center justify-center text-white mb-4"><a href={session.roleplay_link} target="_blank" className="text-ttbOrange underline">เปิดลิงก์วิดีโอ (YouTube)</a></div>
                            <div className="bg-emerald-50 p-4 rounded-xl border border-emerald-200"><p className="font-bold text-emerald-800">AI Score: {session.ai_feedback?.score}%</p><p className="text-sm text-emerald-700 mt-1">{session.ai_feedback?.strengths}</p></div>
                        </div>
                        <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                            <h3 className="font-bold text-xl text-ttbNavy mb-4 border-b pb-2">คำถามสัมภาษณ์สด</h3>
                            <Guideline q="1. ถ้าลูกค้ายกเลิกปีที่ 5 จะได้เงินเท่าไหร่?" g="ตอบว่าได้มูลค่าเวนคืน ซึ่งอาจน้อยกว่าเงินต้นที่จ่ายไป ไม่ปิดบังข้อมูล" />
                            <Guideline q="2. ช่วงตลาดตกหนัก AI จะทำอย่างไร?" g="ตอบว่าใช้ Dynamic Allocation ย้ายเงินไปถือสินทรัพย์ปลอดภัยเพื่อปกป้องความเสี่ยง" />
                            
                            <div className="mt-8 border-t pt-4">
                                <p className="font-bold text-center mb-4 text-ttbNavy">กดเพื่อบันทึกคะแนนสรุป</p>
                                <div className="grid grid-cols-4 gap-2">
                                    <button onClick={() => submitScore(50)} className="bg-red-100 text-red-700 font-bold py-3 rounded-lg hover:bg-red-200">50% (Fail)</button>
                                    <button onClick={() => submitScore(70)} className="bg-red-100 text-red-700 font-bold py-3 rounded-lg hover:bg-red-200">70% (Fail)</button>
                                    <button onClick={() => submitScore(80)} className="bg-green-100 text-green-700 font-bold py-3 rounded-lg hover:bg-green-200">80% (Pass)</button>
                                    <button onClick={() => submitScore(100)} className="bg-ttbBlue text-white font-bold py-3 rounded-lg hover:bg-ttbNavy">100% (Pass)</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 8. ADMIN APP
        // ==========================================
        function AdminApp({ users, setUsers, sessions, setSessions }) {
            const exportData = () => {
                const ws = XLSX.utils.json_to_sheet(users.map(u => ({ EmpID: u.employee_id, Name: u.first_name_en, Role: u.role, Status: sessions[u.id]?.overall_status || 'N/A' })));
                const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Report"); XLSX.writeFile(wb, "TTB_Certification_Report.xlsx");
            };

            const resetUser = (id, name) => {
                if(confirm(`ล้างข้อมูลการสอบของ ${name} ทั้งหมด?`)) {
                    const newSess = {...sessions}; delete newSess[id]; setSessions(newSess);
                }
            };

            return (
                <div className="space-y-6 animate-fade-in">
                    <div className="flex justify-between items-center"><h2 className="text-2xl font-bold text-ttbNavy">Admin Management</h2>
                    <button onClick={exportData} className="bg-green-600 text-white px-4 py-2 rounded-lg font-bold flex items-center shadow-sm"><Icon path={Icons.Download} className="w-4 h-4 mr-2"/> Export Excel</button></div>
                    
                    <div className="grid grid-cols-3 gap-4 mb-6">
                        <div className="bg-white p-6 rounded-xl shadow-sm border"><p className="text-sm font-bold text-gray-500">Total Users</p><p className="text-4xl font-black text-ttbNavy">{users.length}</p></div>
                        <div className="bg-white p-6 rounded-xl shadow-sm border cursor-pointer hover:bg-gray-50" onClick={() => alert('อัปโหลดภาพสำเร็จ')}><p className="text-sm font-bold text-gray-500">Image Upload</p><p className="text-lg font-bold text-ttbOrange mt-2 flex"><Icon path={Icons.Upload} className="w-5 h-5 mr-1"/> Upload Guide</p></div>
                    </div>

                    <div className="bg-white rounded-xl shadow-sm border overflow-hidden">
                        <table className="w-full text-left text-sm"><thead className="bg-gray-50 border-b"><tr><th className="p-4">Name</th><th className="p-4">Role</th><th className="p-4">Status</th><th className="p-4">Action</th></tr></thead>
                        <tbody>{users.map(u => (
                            <tr key={u.id} className="border-b hover:bg-gray-50"><td className="p-4 font-bold text-ttbNavy">{u.first_name_en}</td><td className="p-4">{u.role}</td><td className="p-4 font-bold text-xs">{sessions[u.id]?.overall_status || '-'}</td>
                            <td className="p-4 flex space-x-2">
                                {u.role === 'Candidate' && <button onClick={() => resetUser(u.id, u.first_name_en)} className="text-orange-500 bg-orange-50 p-2 rounded" title="Restart Exam"><Icon path={Icons.Refresh} className="w-4 h-4"/></button>}
                                <button onClick={() => setUsers(users.filter(x => x.id !== u.id))} className="text-red-500 bg-red-50 p-2 rounded"><Icon path={Icons.Trash} className="w-4 h-4"/></button>
                            </td></tr>
                        ))}</tbody></table>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
