<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ttb Audio Interview</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563EB',      // Modern Blue
                        primaryLight: '#DBEAFE', 
                        secondary: '#3B82F6',    
                        brandNavy: '#0F172A',    // Slate 900
                        surface: '#F8FAFC',      // Slate 50
                        textMain: '#1E293B',     // Slate 800
                        textMuted: '#64748B',    // Slate 500
                        danger: '#EF4444',       // Red 500
                        success: '#10B981'       // Emerald 500
                    },
                    fontFamily: { sans: ['Prompt', 'Nunito', 'sans-serif'] },
                    animation: {
                        'slide-up': 'slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'fade-in': 'fadeIn 0.3s ease-out forwards',
                        'pop-in': 'popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
                        'float': 'float 3s ease-in-out infinite',
                        'ripple': 'ripple 1.5s cubic-bezier(0, 0.2, 0.8, 1) infinite',
                        'pulse-fast': 'pulse 0.8s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        slideUp: { '0%': { opacity: 0, transform: 'translateY(40px)' }, '100%': { opacity: 1, transform: 'translateY(0)' } },
                        fadeIn: { '0%': { opacity: 0 }, '100%': { opacity: 1 } },
                        popIn: { '0%': { opacity: 0, transform: 'scale(0.9)' }, '100%': { opacity: 1, transform: 'scale(1)' } },
                        float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-10px)' } },
                        ripple: { '0%': { transform: 'scale(0.8)', opacity: 1 }, '100%': { transform: 'scale(2.4)', opacity: 0 } }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body { background-color: #E2E8F0; font-family: 'Nunito', 'Prompt', sans-serif; -webkit-tap-highlight-color: transparent; display: flex; justify-content: center; min-height: 100vh; margin: 0; }
        .app-container { width: 100%; max-width: 480px; background-color: #F8FAFC; min-height: 100vh; position: relative; display: flex; flex-direction: column; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15); overflow: hidden; }
        @media (min-width: 640px) { body { padding: 20px 0; } .app-container { min-height: 90vh; max-height: 95vh; border-radius: 40px; } }
        
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid #E2E8F0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03); }
        .shadow-soft-3d { box-shadow: 0 10px 25px -5px rgba(37, 99, 235, 0.15), 0 4px 10px -3px rgba(37, 99, 235, 0.1); }
        
        .btn-modern { transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }
        .btn-modern:active { transform: scale(0.97); }
        
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root" class="w-full flex justify-center"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // 1. CONFIGURATION
        // ==========================================
        const SUPABASE_URL = "https://lyfqqrofqbyfezwxwhph.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx5ZnFxcm9mcWJ5ZmV6d3h3aHBoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0ODc3MTAsImV4cCI6MjA4OTA2MzcxMH0.U5rhRSSTplQbcXBL16odRMRL26dy1RCxC_6jkHjhaWA";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ==========================================
        // 2. ICONS
        // ==========================================
        const Icons = {
            Mic: () => <svg width="28" height="28" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>,
            Stop: () => <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="4" ry="4"></rect></svg>,
            Back: () => <svg width="24" height="24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>,
            Check: () => <svg width="24" height="24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>,
            LogOut: () => <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        };

        function PoweredByFooter() {
            return (
                <div className="text-center py-4 text-[9px] font-bold text-slate-400 uppercase tracking-widest w-full">
                    Powered by : PRU ACADEMY <span className="text-primary">[ttb training team]</span>
                </div>
            );
        }

        // ==========================================
        // 3. MAIN APP ROUTER
        // ==========================================
        function App() {
            const [user, setUser] = useState(null);
            const [rubrics, setRubrics] = useState([]);
            const [isLoading, setIsLoading] = useState(true);

            useEffect(() => {
                const initData = async () => {
                    try {
                        const { data } = await supabase.from('trainer_rubrics').select('*');
                        if (data) setRubrics(data);
                    } catch (e) { console.error("Error loading rubrics", e); }
                    
                    try {
                        const savedUser = localStorage.getItem('ttb_audio_user');
                        if (savedUser) setUser(JSON.parse(savedUser));
                    } catch (e) { localStorage.removeItem('ttb_audio_user'); }
                    
                    setIsLoading(false);
                };
                initData();
            }, []);

            const handleLogin = async (empId, fName) => {
                setIsLoading(true);
                try {
                    const { data, error } = await supabase.from('users').select('*').eq('employee_id', empId).ilike('first_name_en', fName).single();
                    if (error || !data || data.role !== 'Candidate') {
                        alert('ข้อมูลไม่ถูกต้อง หรือคุณไม่มีสิทธิ์เข้าใช้งานระบบนี้');
                    } else {
                        setUser(data);
                        localStorage.setItem('ttb_audio_user', JSON.stringify(data));
                    }
                } catch(e) { alert("เกิดข้อผิดพลาดในการเชื่อมต่อฐานข้อมูล"); }
                setIsLoading(false);
            };

            if (isLoading) return <div className="h-screen w-full flex items-center justify-center bg-surface text-primary font-bold"><span className="animate-spin mr-2">⏳</span> Loading...</div>;

            return (
                <div className="app-container">
                    {!user ? <LoginScreen onLogin={handleLogin} /> : <Dashboard user={user} rubrics={rubrics} onLogout={() => {setUser(null); localStorage.removeItem('ttb_audio_user');}} />}
                </div>
            );
        }

        // ==========================================
        // 4. LOGIN SCREEN
        // ==========================================
        function LoginScreen({ onLogin }) {
            const [empId, setEmpId] = useState('');
            const [fName, setFName] = useState('');

            return (
                <div className="flex-1 flex flex-col bg-surface relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-full h-64 bg-gradient-to-br from-brandNavy to-primary rounded-b-[40px] z-0 shadow-lg"></div>
                    <div className="relative z-10 flex flex-col h-full px-6 pt-20">
                        <div className="text-white mb-10 animate-slide-up">
                            <h1 className="text-3xl font-extrabold tracking-tight mb-2">Welcome!</h1>
                            <p className="text-white/80 font-medium text-sm">Please login to start your audio assessment.</p>
                        </div>
                        <div className="glass-card p-8 rounded-[32px] w-full animate-slide-up" style={{animationDelay: '0.1s'}}>
                            <div className="w-16 h-16 bg-primaryLight/40 text-primary rounded-2xl flex items-center justify-center text-3xl mb-6 mx-auto shadow-inner">🎧</div>
                            <form onSubmit={(e) => { e.preventDefault(); onLogin(empId, fName); }} className="space-y-5">
                                <div>
                                    <label className="text-xs font-bold text-slate-500 ml-1 mb-1 block uppercase tracking-widest">Employee ID</label>
                                    <input type="text" value={empId} onChange={e => setEmpId(e.target.value)} className="w-full p-4 rounded-2xl bg-slate-50 border border-slate-200 outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary font-bold text-textMain transition-all text-sm" placeholder="e.g. 000123" required />
                                </div>
                                <div>
                                    <label className="text-xs font-bold text-slate-500 ml-1 mb-1 block uppercase tracking-widest">First Name (EN)</label>
                                    <input type="text" value={fName} onChange={e => setFName(e.target.value)} className="w-full p-4 rounded-2xl bg-slate-50 border border-slate-200 outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary font-bold text-textMain transition-all text-sm" placeholder="e.g. Somchai" required />
                                </div>
                                <button type="submit" className="w-full bg-primary hover:bg-blue-700 text-white font-bold py-4 rounded-2xl btn-modern mt-4 text-sm tracking-wide shadow-soft-3d">Log In</button>
                            </form>
                        </div>
                        <div className="mt-auto pb-6 text-center"><PoweredByFooter /></div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 5. DASHBOARD & SMART STATUS LOCK
        // ==========================================
        function Dashboard({ user, rubrics, onLogout }) {
            const [view, setView] = useState('home'); 
            const [examQuestions, setExamQuestions] = useState([]);
            const [currentStep, setCurrentStep] = useState(0);
            const [showRules, setShowRules] = useState(false);
            
            const [sessionState, setSessionState] = useState(null);
            const [loadingSession, setLoadingSession] = useState(true);

            useEffect(() => {
                const fetchSession = async () => {
                    const { data } = await supabase.from('exam_sessions').select('*').eq('user_id', user.id).single();
                    setSessionState(data || {});
                    setLoadingSession(false);
                    
                    if (data?.pk_passed && !data?.trainer_passed && data?.eval_lock_mode === 'AVAILABLE' && data?.trainer_score === null) {
                        setShowRules(true);
                    }
                };
                if(view === 'home') fetchSession();
            }, [user.id, view]);

            const startExam = async () => {
                if(rubrics.length === 0) return alert("ไม่พบข้อมูลคำถามในระบบ");
                
                const { data: checkSess } = await supabase.from('exam_sessions').select('eval_lock_mode').eq('user_id', user.id).single();
                if (checkSess?.eval_lock_mode === 'LIVE') {
                    alert('เทรนเนอร์ได้เปิดระบบสัมภาษณ์สดให้คุณแล้ว ไม่สามารถเข้าสู่โหมดบันทึกเสียงได้');
                    setSessionState(checkSess);
                    return;
                }

                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    stream.getTracks().forEach(track => track.stop()); 
                    
                    const pkQs = rubrics.filter(r => r.category === 'Product Knowledge');
                    const invQs = rubrics.filter(r => r.category === 'Investment Knowledge');
                    const objQs = rubrics.filter(r => r.category === 'Objection Handling');
                    
                    if(pkQs.length === 0 || invQs.length === 0 || objQs.length === 0) {
                        return alert("ระบบมีคำถามไม่ครบ 3 หมวดหมู่");
                    }

                    const q1 = pkQs[Math.floor(Math.random() * pkQs.length)];
                    const q2 = invQs[Math.floor(Math.random() * invQs.length)];
                    const q3 = objQs[Math.floor(Math.random() * objQs.length)];

                    await supabase.from('exam_sessions').update({ eval_lock_mode: 'AUDIO' }).eq('user_id', user.id);

                    setExamQuestions([q1, q2, q3]);
                    setCurrentStep(0);
                    setView('exam');
                } catch (err) {
                    alert("กรุณาอนุญาตการใช้งานไมโครโฟนในการตั้งค่าเบราว์เซอร์ของคุณก่อนเริ่มสอบ");
                }
            };
            
            const handleCancel = async () => {
                await supabase.from('exam_sessions').update({ eval_lock_mode: 'AVAILABLE' }).eq('user_id', user.id);
                setView('home');
            };

            const handleNext = async () => {
                if (currentStep < 2) {
                    setCurrentStep(currentStep + 1);
                } else {
                    await supabase.from('exam_sessions').update({ eval_lock_mode: 'AVAILABLE' }).eq('user_id', user.id);
                    setView('success');
                }
            };

            if (view === 'exam') return <RecordingScreen key={currentStep} user={user} question={examQuestions[currentStep]} step={currentStep} onCancel={handleCancel} onNext={handleNext} />;
            if (view === 'success') return <SuccessScreen onHome={() => setView('home')} onLogout={onLogout} />;

            const isPkPassed = sessionState?.pk_passed === true;
            const isTrainerPassed = sessionState?.trainer_passed === true;
            const isFailed = sessionState?.trainer_score !== null && sessionState?.trainer_passed === false;
            const isLockedLive = sessionState?.eval_lock_mode === 'LIVE';

            return (
                <div className="flex-1 flex flex-col bg-surface overflow-hidden relative">
                    
                    {/* Pop-up กติกา */}
                    {showRules && (
                        <div className="absolute inset-0 z-50 flex items-center justify-center p-6 bg-brandNavy/60 backdrop-blur-sm animate-fade-in">
                            <div className="bg-white rounded-[32px] p-6 max-w-sm w-full shadow-2xl animate-pop-in relative overflow-hidden">
                                <div className="absolute top-[-40px] right-[-40px] w-24 h-24 bg-primaryLight rounded-full opacity-20 blur-xl"></div>
                                <div className="w-14 h-14 bg-primaryLight/40 text-primary rounded-2xl flex items-center justify-center text-2xl mb-4 shadow-inner">📋</div>
                                <h2 className="text-xl font-extrabold text-brandNavy mb-2">กติกาการสอบสัมภาษณ์</h2>
                                <p className="text-xs font-bold text-slate-500 mb-5">โปรดอ่านทำความเข้าใจก่อนเริ่มการทดสอบ</p>
                                <div className="space-y-3 mb-6 bg-slate-50 p-4 rounded-2xl border border-slate-200">
                                    <div className="flex items-start"><span className="text-primary font-black mr-2">1.</span><p className="text-xs font-bold text-textMain leading-relaxed">ระบบจะสุ่มคำถามให้คุณทั้งหมด <span className="text-primary font-black">3 ข้อ</span><br/>(Product 1 ข้อ, Investment 1 ข้อ, Objection 1 ข้อ)</p></div>
                                    <div className="flex items-start"><span className="text-danger font-black mr-2">2.</span><p className="text-xs font-bold text-textMain leading-relaxed">เมื่อกดเข้าสู่ข้อสอบ คุณจะมีเวลาเตรียมตัว <span className="text-danger font-black">1 นาที</span> ต่อข้อ</p></div>
                                    <div className="flex items-start"><span className="text-danger font-black mr-2">3.</span><p className="text-xs font-bold text-textMain leading-relaxed">⚠️ <span className="text-danger">คุณต้องกดปุ่ม "ไมโครโฟน" ก่อนหมดเวลา</span> หากปล่อยจนเวลาหมด ระบบจะปรับตกข้อนั้นอัตโนมัติ</p></div>
                                </div>
                                <button onClick={() => setShowRules(false)} className="w-full bg-primary hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl btn-modern text-sm shadow-soft-3d">รับทราบกติกา</button>
                            </div>
                        </div>
                    )}

                    {/* Header */}
                    <div className="bg-brandNavy text-white pt-12 pb-16 px-6 relative z-0 shrink-0 rounded-b-[40px] shadow-lg">
                        <div className="absolute top-0 right-0 w-64 h-64 bg-primary opacity-20 blur-3xl rounded-full -translate-y-1/4 translate-x-1/4"></div>
                        <div className="flex justify-between items-center relative z-10">
                            <div>
                                <h1 className="text-2xl font-extrabold mb-1">Hey {user.first_name_en}!</h1>
                                <p className="text-primaryLight text-sm font-medium">ttb US Multi-Asset 15/5</p>
                            </div>
                            <div className="w-12 h-12 bg-white/10 backdrop-blur-sm rounded-full flex items-center justify-center text-xl shadow-inner font-bold cursor-pointer hover:bg-white/20 transition-colors border border-white/10" onClick={onLogout}>👨‍💼</div>
                        </div>
                    </div>

                    {/* Content Container */}
                    <div className="flex-1 bg-surface -mt-8 rounded-t-[32px] relative z-10 flex flex-col px-6 pt-8 pb-4 animate-slide-up">
                        
                        <h3 className="font-extrabold text-brandNavy text-lg mb-6">Status & Evaluation</h3>
                        
                        {loadingSession ? (
                            <div className="flex-1 flex items-center justify-center text-primary font-bold"><span className="animate-spin mr-2">⏳</span> Loading Data...</div>
                        ) : (
                            <>
                                {/* State 1: ยังไม่ผ่าน 30 ข้อ */}
                                {!isPkPassed && !isFailed && !isTrainerPassed && (
                                    <div className="bg-white border border-orange-200 p-6 rounded-[24px] flex flex-col items-center text-center animate-fade-in shadow-sm relative overflow-hidden">
                                        <div className="absolute top-0 left-0 w-full h-1 bg-orange-400"></div>
                                        <div className="w-16 h-16 bg-orange-50 text-orange-500 rounded-full flex items-center justify-center text-3xl mb-4">⚠️</div>
                                        <h4 className="font-extrabold text-brandNavy text-lg">ยังไม่ผ่านการทดสอบภาคทฤษฎี</h4>
                                        <p className="text-xs text-slate-500 font-bold mt-3 leading-relaxed px-2">
                                            คุณจำเป็นต้องสอบผ่านข้อสอบภาคทฤษฎี 30 ข้อก่อน จึงจะสามารถเข้ารับการประเมินสัมภาษณ์ได้<br/><br/>
                                            กรุณากลับไปสแกน <b>"QR Code สีส้ม"</b> เพื่อทำข้อสอบให้เรียบร้อยครับ
                                        </p>
                                    </div>
                                )}

                                {/* State 2: ผ่าน 30 ข้อแล้ว แต่โดน Trainer ล็อกสิทธิ์เตรียมสัมภาษณ์สด */}
                                {isPkPassed && isLockedLive && !isFailed && !isTrainerPassed && (
                                    <div className="bg-white border border-blue-200 p-6 rounded-[24px] flex flex-col items-center text-center animate-fade-in shadow-sm relative overflow-hidden">
                                        <div className="absolute top-0 left-0 w-full h-1 bg-blue-500"></div>
                                        <div className="w-16 h-16 bg-blue-50 text-primary rounded-full flex items-center justify-center text-3xl mb-4">👨‍🏫</div>
                                        <h4 className="font-extrabold text-brandNavy text-lg">เข้าสู่โหมดสัมภาษณ์สด</h4>
                                        <p className="text-xs text-slate-500 font-bold mt-3 leading-relaxed px-2">
                                            เทรนเนอร์ประจำพื้นที่ของคุณ ได้เปิดระบบล็อกสิทธิ์เพื่อทำการสัมภาษณ์สดให้คุณแล้ว<br/><br/>
                                            คุณไม่จำเป็นต้องอัดเสียงผ่านระบบนี้ กรุณาติดต่อ Trainer เพื่อดำเนินการสอบครับ
                                        </p>
                                    </div>
                                )}

                                {/* State 3: สอบตก รอ Trainer อนุมัติสอบซ่อม */}
                                {isFailed && (
                                    <div className="bg-white border border-red-200 p-6 rounded-[24px] flex flex-col items-center text-center animate-fade-in shadow-sm relative overflow-hidden">
                                        <div className="absolute top-0 left-0 w-full h-1 bg-red-500"></div>
                                        <div className="w-16 h-16 bg-red-50 text-danger rounded-full flex items-center justify-center text-3xl mb-4">🚨</div>
                                        <h4 className="font-extrabold text-brandNavy text-lg">รอการพิจารณาสอบซ่อม</h4>
                                        <p className="text-xs text-slate-500 font-bold mt-3 leading-relaxed px-2">
                                            ผลการประเมินล่าสุดของคุณ <b>ไม่ผ่านเกณฑ์ (ได้ {sessionState?.trainer_score}%)</b><br/><br/>
                                            กรุณาติดต่อ Trainer ของท่านเพื่อรับฟังข้อเสนอแนะ (Feedback) และขออนุมัติสิทธิ์ในการทำข้อสอบซ่อมครับ
                                        </p>
                                    </div>
                                )}

                                {/* State 4: สอบผ่านฉลุย (Certified) */}
                                {isTrainerPassed && (
                                    <div className="bg-white border border-emerald-200 p-6 rounded-[24px] flex flex-col items-center text-center animate-fade-in shadow-sm relative overflow-hidden">
                                        <div className="absolute top-0 left-0 w-full h-1 bg-emerald-500"></div>
                                        <div className="w-16 h-16 bg-emerald-50 text-success rounded-full flex items-center justify-center text-3xl mb-4">🏆</div>
                                        <h4 className="font-extrabold text-brandNavy text-lg">ผ่านการประเมินแล้ว</h4>
                                        <p className="text-xs text-slate-500 font-bold mt-3 leading-relaxed px-2">
                                            ขอแสดงความยินดี! คุณผ่านการประเมิน ttb US Multi-Asset 15/5 ทั้งภาคทฤษฎีและภาคปฏิบัติเรียบร้อยแล้ว
                                        </p>
                                        <div className="mt-6 inline-block bg-emerald-50 px-6 py-2 rounded-xl border border-emerald-100 text-emerald-600 font-black text-sm uppercase tracking-widest">
                                            CERTIFIED
                                        </div>
                                    </div>
                                )}

                                {/* State 5: พร้อมให้กดอัดเสียง (ปกติ) */}
                                {isPkPassed && !isLockedLive && !isFailed && !isTrainerPassed && (
                                    <div className="bg-white border border-slate-200 p-6 rounded-[24px] flex flex-col items-center justify-center text-center mb-6 relative overflow-hidden group animate-fade-in shadow-sm">
                                        <div className="w-16 h-16 bg-primaryLight/40 text-primary rounded-2xl flex items-center justify-center text-3xl mb-4 shadow-inner group-hover:scale-110 transition-transform">🎤</div>
                                        <h4 className="font-extrabold text-brandNavy text-lg">Audio Assessment</h4>
                                        <p className="text-xs text-slate-500 font-medium mt-2 px-4 leading-relaxed">ระบบจะสุ่มคำถาม 3 ข้อ ให้คุณอัดเสียงตอบ และจัดส่งให้เทรนเนอร์ประเมินผล</p>
                                        
                                        <button onClick={startExam} className="mt-6 w-full bg-primary hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl btn-modern text-sm shadow-soft-3d">Start Recording</button>
                                    </div>
                                )}
                            </>
                        )}
                    </div>
                </div>
            );
        }

        // ==========================================
        // 6. RECORDING SCREEN
        // ==========================================
        function RecordingScreen({ user, question, step, onCancel, onNext }) {
            const [status, setStatus] = useState('idle'); 
            const [time, setTime] = useState(0);
            const [prepTime, setPrepTime] = useState(60); 
            const [errorMsg, setErrorMsg] = useState('');
            const [audioUrlResult, setAudioUrlResult] = useState(null);
            
            const mediaRecorder = useRef(null);
            const audioChunks = useRef([]);
            const timerRef = useRef(null);
            const recordingTimeRef = useRef(0);
            const mimeType = useRef('');

            const recognitionRef = useRef(null);
            const transcriptRef = useRef(''); 
            const isRecordingRef = useRef(false); 

            useEffect(() => {
                let pTimer;
                if (status === 'idle' && prepTime > 0) {
                    pTimer = setInterval(() => setPrepTime(p => p - 1), 1000);
                } else if (status === 'idle' && prepTime <= 0) {
                    handlePrepTimeout(); 
                }
                return () => clearInterval(pTimer);
            }, [status, prepTime]);

            useEffect(() => {
                return () => { 
                    if(timerRef.current) clearInterval(timerRef.current); 
                    if(recognitionRef.current) recognitionRef.current.stop();
                };
            }, []);

            const formatTime = (secs) => {
                const m = Math.floor(secs / 60).toString().padStart(2, '0');
                const s = (secs % 60).toString().padStart(2, '0');
                return `${m}:${s}`;
            };

            const handlePrepTimeout = async () => {
                setStatus('processing');
                try {
                    const newRecord = { 
                        employee_id: user.employee_id, 
                        first_name_en: user.first_name_en, 
                        question: question.question, 
                        category: question.category, 
                        audio_url: null, 
                        transcript: "[ ไม่มีการตอบคำถาม - หมดเวลาเตรียมตัว 1 นาที ]" 
                    };
                    await supabase.from('audio_submissions').insert([newRecord]);
                    setStatus('done');
                } catch (err) { 
                    setErrorMsg(`❌ ระบบบันทึกข้อมูลล้มเหลว: ${err.message}`); 
                    setStatus('idle'); 
                }
            };

            const setupSpeechRecognition = () => {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) {
                    transcriptRef.current = "[ เบราว์เซอร์ไม่รองรับการถอดความอัตโนมัติ กรุณาฟังจากไฟล์เสียง ]";
                    return null;
                }
                const recognition = new SpeechRecognition();
                recognition.continuous = true; 
                recognition.interimResults = true;
                recognition.lang = 'th-TH'; 
                recognition.onresult = (event) => {
                    let finalTranscript = '';
                    for (let i = event.resultIndex; i < event.results.length; ++i) {
                        if (event.results[i].isFinal) finalTranscript += event.results[i][0].transcript + ' ';
                    }
                    if (finalTranscript) transcriptRef.current += finalTranscript;
                };
                recognition.onend = () => {
                    if (isRecordingRef.current) { try { recognition.start(); } catch(e) {} }
                };
                return recognition;
            };

            const startRecording = async () => {
                setErrorMsg('');
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    const types = ['audio/webm;codecs=opus', 'audio/mp4', 'audio/webm', 'audio/aac'];
                    for (let type of types) { if (MediaRecorder.isTypeSupported(type)) { mimeType.current = type; break; } }
                    if(!mimeType.current) mimeType.current = 'audio/webm'; 

                    mediaRecorder.current = new MediaRecorder(stream, { mimeType: mimeType.current });
                    audioChunks.current = [];
                    
                    transcriptRef.current = '';
                    isRecordingRef.current = true;
                    
                    recognitionRef.current = setupSpeechRecognition();
                    if (recognitionRef.current) { try { recognitionRef.current.start(); } catch(e){} }

                    mediaRecorder.current.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.current.push(e.data); };
                    
                    mediaRecorder.current.onstop = () => {
                        if (recordingTimeRef.current < 2 || audioChunks.current.length === 0) {
                            setErrorMsg("⚠️ เวลาอัดเสียงสั้นเกินไป กรุณาอธิบายรายละเอียดให้ชัดเจนแล้วลองใหม่"); setStatus('idle'); return;
                        }
                        const audioBlob = new Blob(audioChunks.current, { type: mimeType.current });
                        if (audioBlob.size < 1024) { 
                            setErrorMsg("⚠️ ไฟล์เสียงผิดปกติ (ไม่มีเสียงเข้า) กรุณาตรวจสอบไมโครโฟน"); setStatus('idle'); return; 
                        }
                        processAndSubmit(audioBlob); 
                    };

                    mediaRecorder.current.start(200);
                    setStatus('recording'); setTime(0); recordingTimeRef.current = 0;
                    timerRef.current = setInterval(() => { setTime(t => t + 1); recordingTimeRef.current += 1; }, 1000);
                } catch (err) { 
                    setErrorMsg("⚠️ เบราว์เซอร์ของคุณไม่อนุญาตให้ใช้ไมโครโฟน กรุณาตั้งค่าอนุญาต (Allow)"); 
                }
            };

            const stopRecording = () => {
                if (mediaRecorder.current && status === 'recording') {
                    isRecordingRef.current = false; 
                    if (recognitionRef.current) { try { recognitionRef.current.stop(); } catch(e){} }
                    mediaRecorder.current.stop();
                    mediaRecorder.current.stream.getTracks().forEach(track => track.stop()); 
                    clearInterval(timerRef.current);
                    setStatus('processing');
                }
            };

            const processAndSubmit = async (audioBlob) => {
                try {
                    const fileName = `${user.employee_id}_${Date.now()}.${mimeType.current.includes('mp4') ? 'mp4' : 'webm'}`;
                    const { error: uploadErr } = await supabase.storage.from('exam_audios').upload(fileName, audioBlob, { contentType: mimeType.current });
                    if (uploadErr) throw new Error(`อัปโหลดไฟล์เสียงไม่สำเร็จ (${uploadErr.message})`);
                    
                    const publicUrl = supabase.storage.from('exam_audios').getPublicUrl(fileName).data.publicUrl;
                    setAudioUrlResult(publicUrl); 

                    let finalTranscript = transcriptRef.current.trim();
                    if (!finalTranscript) finalTranscript = "[ ระบบไม่สามารถจับข้อความเสียงได้ หรือไม่ได้พูด กรุณาให้เทรนเนอร์เปิดฟังจากไฟล์เสียง ]";

                    const newRecord = { employee_id: user.employee_id, first_name_en: user.first_name_en, question: question.question, category: question.category, audio_url: publicUrl, transcript: finalTranscript, ai_score: null, ai_feedback: null };
                    const { error: dbErr } = await supabase.from('audio_submissions').insert([newRecord]);
                    if (dbErr) throw new Error(`บันทึกข้อมูลลงตารางไม่สำเร็จ (${dbErr.message})`);
                    
                    setStatus('done');
                } catch (err) {
                    console.error("Error Detail:", err); setErrorMsg(`❌ เกิดข้อผิดพลาด: ${err.message}`); setStatus('idle');
                }
            };

            let timerStyles = "text-primary border-blue-200 bg-blue-50";
            if (prepTime <= 10) timerStyles = "text-red-500 border-red-700 bg-brandNavy animate-pulse-fast";
            else if (prepTime <= 30) timerStyles = "text-danger border-red-200 bg-red-50 animate-pulse";

            if (status === 'done') {
                return <ResultScreen step={step} question={question} audioUrl={audioUrlResult} onNext={onNext} />;
            }

            return (
                <div className="flex-1 flex flex-col bg-surface relative overflow-hidden animate-slide-up">
                    <div className="pt-10 px-6 pb-20 relative shrink-0 text-center">
                        <button onClick={onCancel} className="absolute top-8 left-6 text-brandNavy p-2 bg-white rounded-full shadow-sm"><Icons.Back /></button>
                        <div className="w-20 h-20 bg-white rounded-3xl mx-auto flex items-center justify-center text-4xl shadow-sm border border-slate-100 mb-4 mt-4 animate-float">💬</div>
                        <span className="bg-primaryLight text-primary text-[10px] font-extrabold px-3 py-1 rounded-md uppercase tracking-widest">{question.category}</span>
                        <h2 className="text-xs font-bold text-slate-500 uppercase tracking-widest mt-4">Question {step + 1} of 3</h2>
                    </div>

                    <div className="flex-1 bg-white -mt-10 rounded-t-[32px] shadow-[0_-10px_40px_rgba(0,0,0,0.05)] border-t border-slate-100 relative z-10 flex flex-col p-6">
                        <div className="bg-slate-50 p-5 rounded-2xl mb-6 border border-slate-200 shadow-inner">
                            <p className="font-bold text-brandNavy text-sm leading-relaxed text-center">{question.question}</p>
                        </div>
                        {errorMsg && <div className="bg-red-50 border border-red-200 text-danger p-4 rounded-xl text-xs font-bold w-full text-center mb-4 leading-relaxed">{errorMsg}</div>}

                        <div className="mt-auto mb-6 flex flex-col items-center justify-center w-full">
                            {status === 'idle' && (
                                <div className="text-center w-full animate-fade-in">
                                    <div className={`mb-6 flex flex-col justify-center items-center p-4 rounded-2xl border-2 transition-colors shadow-sm ${timerStyles}`}>
                                        <span className="text-[10px] font-extrabold uppercase tracking-widest mb-1">เวลาเตรียมตัว (ห้ามเกิน 1 นาที)</span>
                                        <span className="text-4xl font-black">{formatTime(prepTime)}</span>
                                    </div>
                                    <button onClick={startRecording} className="w-20 h-20 bg-primary text-white rounded-full flex items-center justify-center shadow-lg shadow-primary/40 btn-modern mx-auto border-4 border-white"><Icons.Mic /></button>
                                    <p className="text-slate-400 text-[10px] font-bold mt-4 uppercase tracking-widest">Tap to Record</p>
                                </div>
                            )}

                            {status === 'recording' && (
                                <div className="text-center w-full animate-fade-in">
                                    <div className="mb-6 flex justify-center items-center gap-3 text-danger bg-red-50 py-3 px-6 rounded-full border border-red-100 shadow-sm inline-flex">
                                        <div className="w-3 h-3 bg-danger rounded-full animate-pulse"></div>
                                        <span className="text-3xl font-black font-mono">{formatTime(time)}</span>
                                    </div>
                                    <div className="relative flex justify-center items-center w-full mt-4">
                                        <button onClick={stopRecording} className="w-20 h-20 bg-danger text-white rounded-full flex items-center justify-center relative z-10 mic-waves shadow-lg shadow-red-500/40 border-4 border-white"><Icons.Stop /></button>
                                    </div>
                                    <p className="text-slate-400 text-[10px] font-bold mt-6 uppercase tracking-widest">Tap to Stop & Submit</p>
                                </div>
                            )}

                            {status === 'processing' && (
                                <div className="text-center w-full animate-fade-in">
                                    <div className="w-16 h-16 border-4 border-slate-100 border-t-primary rounded-full animate-spin mx-auto mb-6"></div>
                                    <h3 className="font-extrabold text-brandNavy text-sm mb-1">กำลังบันทึกข้อมูล...</h3>
                                    <p className="text-[10px] font-medium text-slate-500">Uploading audio to secure server.</p>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 7. RESULT SCREEN
        // ==========================================
        function ResultScreen({ step, question, audioUrl, onNext }) {
            const isLast = step === 2;
            return (
                <div className="flex-1 flex flex-col h-full bg-surface animate-slide-up relative">
                    <div className="bg-brandNavy text-white pt-10 pb-8 px-6 rounded-b-[32px] shadow-sm relative overflow-hidden shrink-0">
                        <div className="absolute right-[-20px] top-2 w-32 h-32 bg-primary opacity-30 rounded-full blur-2xl"></div>
                        <div className="relative z-10 text-center">
                            <div className="w-16 h-16 bg-white/10 text-success border border-white/20 rounded-full flex items-center justify-center mx-auto mb-4"><Icons.Check /></div>
                            <h2 className="text-2xl font-black mb-1">Submission Saved!</h2>
                            <p className="text-slate-400 text-xs font-medium uppercase tracking-widest">Question {step + 1} / 3 Completed</p>
                        </div>
                    </div>
                    <div className="flex-1 overflow-y-auto p-6 space-y-6 pb-28 flex flex-col justify-center">
                        <div className="glass-card p-6 text-center">
                            <p className="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest mb-4">You have answered:</p>
                            <p className="font-bold text-brandNavy text-sm leading-relaxed mb-6">{question.question}</p>
                            {audioUrl && (
                                <div className="bg-slate-50 p-4 rounded-2xl border border-slate-200">
                                    <p className="text-[10px] font-extrabold text-primary uppercase tracking-widest mb-3 flex items-center justify-center"><span className="text-base mr-1.5">🎙️</span> Your Audio Recording</p>
                                    <audio controls src={audioUrl} className="w-full outline-none"></audio>
                                </div>
                            )}
                            <p className="text-xs text-slate-500 font-bold mt-6">⚠️ คำตอบของคุณถูกบันทึกและส่งให้ Trainer เพื่อประเมินผลเรียบร้อยแล้ว</p>
                        </div>
                    </div>
                    <div className="absolute bottom-0 w-full bg-white/90 backdrop-blur-md px-6 py-5 border-t border-slate-200 z-20">
                        <button onClick={onNext} className={`w-full font-extrabold py-4 rounded-xl btn-modern uppercase tracking-wider text-sm shadow-soft-3d ${isLast ? 'bg-success text-white hover:bg-emerald-600' : 'bg-primary text-white hover:bg-blue-700'}`}>
                            {isLast ? 'เสร็จสิ้นการสอบ (Finish)' : 'ดำเนินการต่อข้อถัดไป (Next)'}
                        </button>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 8. SUCCESS SCREEN
        // ==========================================
        function SuccessScreen({ onHome, onLogout }) {
            return (
                <div className="flex-1 flex flex-col items-center justify-center px-6 bg-brandNavy relative overflow-hidden animate-fade-in">
                    <div className="absolute top-0 left-0 w-full h-full overflow-hidden z-0">
                        <div className="absolute -top-[10%] -left-[10%] w-[60%] h-[60%] rounded-full bg-success/20 blur-[100px]"></div>
                        <div className="absolute top-[40%] -right-[10%] w-[60%] h-[60%] rounded-full bg-primary/20 blur-[100px]"></div>
                    </div>
                    
                    <div className="glass-card p-8 rounded-[32px] text-center relative z-10 w-full">
                        <div className="w-24 h-24 bg-emerald-50 text-success rounded-full flex items-center justify-center text-5xl mx-auto mb-6 shadow-inner border border-emerald-100">🏆</div>
                        <h2 className="text-xl font-extrabold text-brandNavy mb-3">การประเมินเสร็จสมบูรณ์</h2>
                        <p className="text-xs font-bold text-slate-500 mb-8 leading-relaxed">
                            ระบบได้ทำการบันทึกข้อมูลการทดสอบของท่านเรียบร้อยแล้ว<br/>โปรดรอรับแจ้งผลการประเมินจากวิทยากรประจำภูมิภาค (Trainer) ของท่านในลำดับถัดไป
                        </p>
                        <button onClick={onHome} className="w-full bg-primary hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl btn-modern text-sm mb-3 shadow-soft-3d">
                            กลับหน้าหลัก (Dashboard)
                        </button>
                        <button onClick={onLogout} className="w-full bg-white text-danger border border-red-200 font-bold py-3.5 rounded-xl btn-modern text-sm shadow-sm hover:bg-red-50 flex items-center justify-center">
                            <Icons.LogOut /> <span className="ml-2">ออกจากระบบ (Close)</span>
                        </button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
